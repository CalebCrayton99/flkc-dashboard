/* ── Formatters ─────────────────────────────────────────────────────── */
const fm = v => "$" + Math.round(v).toLocaleString();
const fK = v => "$" + (v / 1000).toFixed(0) + "K";
const fP = v => (v * 100).toFixed(1) + "%";
const M = "'JetBrains Mono',monospace";

/* ── Small UI components ───────────────────────────────────────────── */
function Sl({l, v, set, mn, mx, st = 1, f = fm, sub}) {
  return (
    <div style={{marginBottom: 13}}>
      <div style={{display: "flex", justifyContent: "space-between", marginBottom: 3}}>
        <span style={{fontSize: 12, color: "#9ca3af", fontWeight: 500}}>{l}</span>
        <span style={{fontSize: 13, color: "#5b8af5", fontFamily: M, fontWeight: 700}}>{f(v)}</span>
      </div>
      <input type="range" min={mn} max={mx} step={st} value={v}
        onChange={e => set(+e.target.value)} style={{width: "100%"}}/>
      {sub && <div style={{fontSize: 10, color: "#6b7280", marginTop: 2}}>{sub}</div>}
    </div>
  );
}

function Fd({l, v, set, sub}) {
  return (
    <div style={{marginBottom: 11}}>
      <label style={{fontSize: 11, color: "#9ca3af", fontWeight: 500, display: "block", marginBottom: 2}}>{l}</label>
      <input type="number" value={v} onChange={e => set(+e.target.value)}
        style={{width: "100%", padding: "5px 8px", borderRadius: 5, border: "1px solid #2a2d38",
          background: "#1e2130", color: "#e8eaed", fontSize: 12, fontFamily: M, boxSizing: "border-box"}}/>
      {sub && <div style={{fontSize: 10, color: "#6b7280", marginTop: 2}}>{sub}</div>}
    </div>
  );
}

function KP({l, v, c, sub, children}) {
  return (
    <div style={{background: "#181b23", borderRadius: 10, padding: "12px 16px",
      border: "1px solid #2a2d38", flex: 1, minWidth: 130}}>
      <div style={{fontSize: 9, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3}}>{l}</div>
      <div style={{fontSize: 17, fontWeight: 800, color: c || "#e8eaed", fontFamily: M}}>{v}</div>
      {sub && <div style={{fontSize: 10, color: "#6b7280", marginTop: 2}}>{sub}</div>}
      {children}
    </div>
  );
}

function Sc({t, children}) {
  return (
    <div style={{marginBottom: 18}}>
      {t && <h3 style={{fontSize: 11, color: "#5b8af5", textTransform: "uppercase", letterSpacing: 1.5,
        marginBottom: 8, fontWeight: 700, borderBottom: "1px solid #2a2d38", paddingBottom: 5}}>{t}</h3>}
      {children}
    </div>
  );
}

function Br({l, v, mx, c}) {
  const p = mx > 0 ? Math.min(v / mx, 1) : 0;
  return (
    <div style={{marginBottom: 7}}>
      <div style={{display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2}}>
        <span style={{color: "#6b7280"}}>{l}</span>
        <span style={{fontFamily: M, color: "#e8eaed", fontWeight: 600}}>{fm(v)}</span>
      </div>
      <div style={{height: 5, background: "#2a2d38", borderRadius: 3}}>
        <div style={{height: "100%", width: (p * 100) + "%", background: c || "#5b8af5",
          borderRadius: 3, transition: "width 0.3s"}}/>
      </div>
    </div>
  );
}

function Rw({children, c = 2}) {
  return <div style={{display: "grid", gridTemplateColumns: "repeat(" + c + ", 1fr)", gap: 14}}>{children}</div>;
}

function St({l, v, c}) {
  return (
    <div style={{display: "flex", justifyContent: "space-between", padding: "4px 0",
      borderBottom: "1px solid #2a2d38", fontSize: 11}}>
      <span style={{color: "#6b7280"}}>{l}</span>
      <span style={{fontFamily: M, fontWeight: 600, color: c || "#e8eaed"}}>{v}</span>
    </div>
  );
}

function BvA({l, b, a}) {
  const p = b > 0 ? a / b : 0;
  const c = p >= 0.9 ? "#4ade80" : p >= 0.5 ? "#fbbf24" : "#f87171";
  return (
    <div style={{marginBottom: 9}}>
      <div style={{display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2}}>
        <span style={{color: "#6b7280"}}>{l}</span>
        <span style={{fontFamily: M, fontSize: 9}}>
          <span style={{color: c}}>{fm(a)}</span> / {fm(b)} ({fP(p)})
        </span>
      </div>
      <div style={{height: 7, background: "#2a2d38", borderRadius: 4, position: "relative"}}>
        <div style={{position: "absolute", height: "100%", width: (Math.min(p, 1) * 100) + "%",
          background: c, borderRadius: 4, transition: "width 0.3s"}}/>
      </div>
    </div>
  );
}

function Tx({l, v, set, type = "text", opts}) {
  return (
    <div style={{marginBottom: 7}}>
      <label style={{fontSize: 10, color: "#9ca3af", fontWeight: 500, display: "block", marginBottom: 2}}>{l}</label>
      {opts
        ? <select value={v} onChange={e => set(e.target.value)}
            style={{width: "100%", padding: "4px 7px", borderRadius: 4, border: "1px solid #2a2d38",
              background: "#1e2130", color: "#e8eaed", fontSize: 11}}>
            {opts.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        : <input type={type} value={v} onChange={e => set(type === "number" ? +e.target.value : e.target.value)}
            style={{width: "100%", padding: "4px 7px", borderRadius: 4, border: "1px solid #2a2d38",
              background: "#1e2130", color: "#e8eaed", fontSize: 11,
              fontFamily: type === "number" ? M : "inherit", boxSizing: "border-box"}}/>
      }
    </div>
  );
}

  /* ── WIP parser ─────────────────────────────────────────────────── */
  const parseWIP = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const dateCell = ws['B4'];
      setWipDate(dateCell ? dateCell.v : '');
      const projects = [];
      for (let r = 9; r <= 90; r++) {
        const bCell = ws['B' + r];
        if (!bCell || !bCell.v) continue;
        const name = String(bCell.v).trim();
        if (!name || name === 'Formulas' || name.startsWith('Total')) continue;
        const getNum = (col) => {
          const cell = ws[col + r];
          if (!cell) return 0;
          const v = cell.v;
          if (typeof v === 'number') return v;
          if (typeof v === 'string') {
            const s = v.trim();
            if (s === '-' || s === '- ' || s === ' - ' || s === '') return 0;
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
          }
          return 0;
        };
        projects.push({
          name,
          contractPrice: getNum('G'),
          origBudget: getNum('H'),
          currentBudget: getNum('J'),
          actualCost: getNum('K'),
          remainBudget: getNum('L'),
          estCostToComplete: getNum('M'),
          bestEstCost: getNum('N'),
          estFinalGP: getNum('Q'),
          origGPpct: getNum('R'),
          finalGPpct: getNum('T'),
          costSlip: getNum('U'),
          pctComplete: getNum('V'),
          earnedGP: getNum('W'),
          totalInvoiced: getNum('Z'),
          overbilled: getNum('AA'),
          underbilled: getNum('AB'),
          remainingContract: getNum('AC'),
          remainingCosts: getNum('AD'),
          workingCapital: getNum('AE'),
        });
      }
      setWipData(projects);
    };
    reader.readAsArrayBuffer(file);
  };

  /* ── P&L parser ────────────────────────────────────────────────── */
  const parsePL = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const months = [];
      for (let c = 1; c <= 12; c++) {
        const col = String.fromCharCode(65 + c);
        const cell = ws[col + '5'];
        if (cell && cell.v) months.push({col, label: String(cell.v)});
      }
      const getVal = (col, row) => {
        const cell = ws[col + row];
        if (!cell) return 0;
        const v = cell.v;
        if (typeof v === 'number') return v;
        if (typeof v === 'string') {
          if (v.startsWith('==')) {
            const numPart = v.substring(2);
            if (/^-?[\d.]+$/.test(numPart.trim())) {
              const n = parseFloat(numPart);
              return isNaN(n) ? 0 : n;
            }
            return 0;
          }
          return 0;
        }
        return 0;
      };
      const data = months.map(m => {
        let incomeCalc = 0;
        for (let r = 7; r <= 22; r++) incomeCalc += getVal(m.col, r);
        let cogsCalc = 0;
        for (let r = 25; r <= 36; r++) cogsCalc += getVal(m.col, r);
        let expCalc = 0;
        for (let r = 40; r <= 98; r++) expCalc += getVal(m.col, r);
        const gpCalc = incomeCalc - cogsCalc;
        const niCalc = gpCalc - expCalc;
        const gpmCalc = incomeCalc > 0 ? gpCalc / incomeCalc : 0;
        return {
          month: m.label,
          revenue: incomeCalc,
          cogs: cogsCalc,
          gp: gpCalc,
          gpm: gpmCalc,
          expenses: expCalc,
          netIncome: niCalc,
          nim: incomeCalc > 0 ? niCalc / incomeCalc : 0,
        };
      }).filter(m => m.revenue !== 0 || m.cogs !== 0);
      setPlData(data);
    };
    reader.readAsArrayBuffer(file);
  };

  /* ══ CALCULATIONS ══════════════════════════════════════════════════ */
  const repC = reps.map(r => {
    const proBase = r.base * (r.moActive / 12);
    const carAnn = r.carType === 'monthly' ? r.carAmt * r.moActive : r.carAmt;
    const comm = Math.max(0, r.goal - r.threshold) * cr;
    const e401v = r.in401k ? r.base * r.f401k : 0;
    return {...r, proBase, carAnn, comm, e401v};
  });
  const staffC = staff.map(s => {
    const ann = s.type === 'hourly' ? s.rate * s.hrsWk * 52 : s.base;
    const e401v = s.in401k ? s.base * s.f401k : 0;
    return {...s, ann, e401v};
  });
  const tW = repC.reduce((a,r)=>a+r.proBase,0) + staffC.reduce((a,s)=>a+s.ann,0);
  const tCar = repC.reduce((a,r)=>a+r.carAnn,0);
  const tCom = repC.reduce((a,r)=>a+r.comm,0) + aS * cr;
  const tBon = reps.reduce((a,r)=>a+r.bonus,0) + staff.reduce((a,s)=>a+s.bonus,0);
  const tComp = tW + tCar + tCom + tBon;
  const prTx = tComp * 0.11;
  const e401T = repC.reduce((a,r)=>a+r.e401v,0) + staffC.reduce((a,s)=>a+s.e401v,0);
  const c401 = e401T * 0.03;
  const tPay = tComp + prTx + c401;
  const tRev = reps.reduce((a,r)=>a+r.goal,0) + houseGoal + aS;
  const gp = tRev * gpm;
  const tOH = rent + ins + tech + acct + fcfo + ads + trav + oth + bank + dues + post + txLc + trn + plc;
  const tExp = tPay + tOH;
  const beRev = gpm > 0 ? tExp / gpm : 0;

  /* Install calcs */
  const crMo = Math.max(0, 12 - crSt + 1);
  const sesMo = Math.min(crMo, 9 - (crSt - 3));
  const sesWk = wkW * (Math.max(0, sesMo) / 9);
  const wkDy = sesWk * 5;
  const tCapCalc = iRt * wkDy; /* crew-derived capacity */
  const tCap = instSfOver !== null ? instSfOver : tCapCalc;
  const instRev = tCap * subRt; /* install div revenue = sqft × sub rate (markup excluded — would flow to main biz regardless) */
  const crLabBurd = crCt * crRt * 8 * wkDy * (1 + burdenRt);
  const fmBurd = fmBase * (1 + burdenRt);
  const eqMo = tPmt + sPmt + fuel;
  const eqC = eqMo * crMo;
  const consTotal = consPsf * tCap;
  const stoneTotal = stonePsf * tCap;
  const crInsP = crIns * (crMo / 12);
  const tInt = crLabBurd + fmBurd + eqC + crInsP + consTotal + stoneTotal + fmBon;
  const iPsf = tCap > 0 ? tInt / tCap : 0;
  const subCS = subRt * tCap;
  const intSv = subCS - tInt;
  const intMr = clRt > 0 ? (clRt - iPsf) / clRt : 0;
  const subMr = clRt > 0 ? (clRt - subRt) / clRt : 0;
  const tDn = 70000 * 0.2 + 60000 * 0.2;
  const sCap = 25343 + 7498;
  const yr1C = tDn + sCap;

  /* Company-wide (model-only, no actuals) */
  const companyNOI = gp - tExp + (instOn ? intSv : 0);
  const companyPtet = Math.max(0, companyNOI * ptet);
  const companyNI = companyNOI - companyPtet;
  const companyNM = tRev > 0 ? companyNI / tRev : 0;

  /* ── Blended Forecast (actuals + projections) ──────────────────── */
  const plMoCount = plData ? plData.length : 0;

  const plActCogs = plData ? plData.reduce((a, m) => a + m.cogs, 0) : 0;
  const plActGP = plActRev - plActCogs;
  const plActExp = plData ? plData.reduce((a, m) => a + m.expenses, 0) : 0;
  const plActGPM = plActRev > 0 ? plActGP / plActRev : gpm;

  const projMonthlyRev = tRev / 12;

  const bGPMFull = bRevFull > 0 ? bGPFull / bRevFull : gpm;

  const tabs = ["Overview", "Team", "Reps", "Install", "Sales Log", "Install Log", "Job Costing", "WIP", "P&L Actuals", "Open AR", "Dashboard"];

  /* Rep card component */

    <div style={{display:'flex', justifyContent:'center', alignItems:'center',
      minHeight:'100vh', background:'#0f1117', color:'#5b8af5', fontSize:14}}>
      Loading dashboard...</div>
  );

  return (
    <div style={{minHeight: "100vh"}}>

      {/* ── SCENARIO BANNER ─────────────────────────────────────── */}
      {scenario && <div style={{background:'linear-gradient(90deg,#f59e0b,#d97706)',
        padding:'8px 18px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:14, fontWeight:800, color:'#000', letterSpacing:1}}>SCENARIO MODE</span>
          <span style={{fontSize:11, color:'#451a03'}}>Changes are temporary and will NOT be saved</span>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button onClick={resetScenario}
            style={{padding:'4px 14px', borderRadius:5, background:'#fff', color:'#d97706',
              fontSize:10, fontWeight:700, border:'none', cursor:'pointer'}}>Reset to Real Data</button>
          <button onClick={stopScenario}
            style={{padding:'4px 14px', borderRadius:5, background:'#451a03', color:'#fbbf24',
              fontSize:10, fontWeight:700, border:'none', cursor:'pointer'}}>Exit Scenario</button>
        </div>
      </div>}

      {dbError && <div style={{background:'rgba(248,113,113,0.1)', borderBottom:'1px solid #f87171',
        padding:'6px 18px', fontSize:10, color:'#f87171'}}>
        Database error: {dbError} — showing local fallback data</div>}

      {/* ── HEADER ──────────────────────────────────────────────── */}
      <div style={{background: scenario ? "linear-gradient(135deg,#2a1f0a,#1a1f2e)" : "linear-gradient(135deg,#181b23,#1a1f2e)",
        borderBottom: "1px solid " + (scenario ? "#f59e0b" : "#2a2d38"), padding: "14px 18px 10px"}}>
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10}}>
          <div>
            <h1 style={{margin: 0, fontSize: 16, fontWeight: 800}}>FLKC 2026 Business Model
              <span style={{fontSize:9, color: dbError ? '#f87171' : '#4ade80', marginLeft:8, fontWeight:500}}>
                {dbError ? 'Local mode' : 'Cloud sync'}</span>
              {saveStatus === 'saving' && <span style={{fontSize:9, color:'#fbbf24', marginLeft:6}}>Saving...</span>}
              {saveStatus === 'saved' && <span style={{fontSize:9, color:'#4ade80', marginLeft:6}}>Saved</span>}
              {saveStatus === 'error' && <span style={{fontSize:9, color:'#f87171', marginLeft:6}}>Save failed</span>}
            </h1>
            <div style={{fontSize: 10, color: "#6b7280", marginTop: 1}}>ForeverLawn KC | DSM | STL &mdash; Caleb Crayton</div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            {!scenario && undoStack.length > 0 && <button onClick={popUndo}
              style={{padding:'5px 14px', borderRadius:5, border:'1px solid #5b8af5',
                background:'rgba(91,138,245,0.1)', color:'#5b8af5',
                fontSize:10, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
                whiteSpace:'nowrap'}}>
              Undo ({undoStack.length})</button>}
            <button onClick={() => scenario ? stopScenario() : startScenario()}
              style={{padding:'5px 14px', borderRadius:5,
                border: scenario ? '2px solid #f59e0b' : '1px solid #2a2d38',
                background: scenario ? 'rgba(245,158,11,0.15)' : '#181b23',
                color: scenario ? '#f59e0b' : '#6b7280',
                fontSize:10, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
                whiteSpace:'nowrap'}}>
              Scenario: {scenario ? 'ON' : 'OFF'}</button>
            <button onClick={() => setInstOn(!instOn)}
              style={{padding:'5px 14px', borderRadius:5,
                border: instOn ? '2px solid #4ade80' : '2px solid #f87171',
                background: instOn ? 'rgba(74,222,128,0.1)' : 'rgba(248,113,113,0.1)',
                color: instOn ? '#4ade80' : '#f87171',
                fontSize:10, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
                whiteSpace:'nowrap'}}>
              Install Div: {instOn ? 'ON' : 'OFF'}</button>
            <button onClick={handleLogout}
              style={{padding:'4px 10px', borderRadius:4, border:'1px solid #2a2d38',
                background:'none', color:'#6b7280', fontSize:9, cursor:'pointer',
                fontFamily:'inherit'}}>Lock</button>
          </div>
        </div>
        <div style={{display: "flex", gap: 8, flexWrap: "wrap"}}>
          <KP l="Revenue Goal" v={fm(tRev)} sub={hasBlend ? "Blended: " + fm(bRevFull) + " (" + plMoCount + "mo actual + " + remainMo + "mo proj)" : "Based on rep sales goals"}/>
          <KP l="Actual YTD Sales" v={fm(aTot)} c="#5b8af5"
            sub={fP(tRev > 0 ? aTot / tRev : 0) + " of goal | " + s26.length + " projects"}/>
          <KP l={hasBlend ? "Net Income (Blended)" : "Net Income (Model)"}
            v={fm(hasBlend ? bNIFull : companyNI)}
            c={(hasBlend ? bNIFull : companyNI) >= 0 ? "#4ade80" : "#f87171"}
            sub={fP(hasBlend ? bNMFull : companyNM) + " margin" + (instOn ? " (incl install div)" : "") + (hasBlend ? " | Model: " + fm(companyNI) : "")}/>
          <KP l="Breakeven" v={fm(beRev)}
            c={tRev >= beRev ? "#4ade80" : "#f87171"}
            sub={tRev >= beRev ? fK(tRev - beRev) + " above" : fK(beRev - tRev) + " below"}/>
          {hasBlend && <KP l="Actual GPM" v={fP(plActGPM)} c={plActGPM >= 0.26 ? "#4ade80" : plActGPM >= 0.15 ? "#fbbf24" : "#f87171"}
            sub={plMoCount + " months | Model: " + fP(gpm)}/>}
        </div>
      </div>

      {/* ── TABS ────────────────────────────────────────────────── */}
      <div style={{display: "flex", borderBottom: "1px solid #2a2d38", background: "#181b23",
        padding: "0 14px", overflowX: "auto"}}>
        {tabs.map((t, i) =>
          <button key={i} onClick={() => setTab(i)}
            style={{padding: "8px 14px", background: "none", border: "none",
              borderBottom: tab === i ? "2px solid #5b8af5" : "2px solid transparent",
              color: tab === i ? "#e8eaed" : "#6b7280", fontSize: 11,
              fontWeight: tab === i ? 700 : 500, cursor: "pointer",
              fontFamily: "inherit", whiteSpace: "nowrap"}}>{t}</button>
        )}
      </div>

      <div style={{padding: "14px 18px", maxWidth: 1200}}>

        {/* ═══ TAB 0: OVERVIEW ═══ */}
        {tab === 0 && <Rw>
          <div>
            <Sc t="Revenue Goals (by Rep)">
              {reps.map(r =>
                <Sl key={r.id} l={r.name + " - " + r.market} v={r.goal}
                  set={v => updRep(r.id, 'goal', v)} mn={0} mx={3e6} st={25000}
                  sub={"Actual: " + fm(aByR(r.name)) + (r.moActive < 12 ? " | " + r.moActive + "mo" : "")}/>
              )}
              <Sl l="House Account" v={houseGoal} set={setHouseGoal} mn={0} mx={2e6} st={25000}
                sub={"Actual: " + fm(houseActual)}/>
              <div style={{padding: "8px 12px", background: "#181b23", borderRadius: 7,
                border: "1px solid #5b8af5", display: "flex", justifyContent: "space-between",
                fontWeight: 700, fontSize: 13}}>
                <span>Total Revenue Goal</span>
                <span style={{fontFamily: M, color: "#5b8af5"}}>{fm(tRev)}</span>
              </div>
            </Sc>
            <Sc t="Market Goals">
              {(() => {
                const markets = [...new Set(reps.map(r => r.market))];
                const mGoal = m => reps.filter(r => r.market === m).reduce((a,r) => a + r.goal, 0);
                return markets.map(m => <BvA key={m} l={m} b={mGoal(m)} a={aByM(m)}/>);
              })()}
            </Sc>
            <Sc t="GPM & Tax">
              <Sl l="Blended GPM" v={gpm} set={sGpm} mn={0.15} mx={0.40} st={0.005} f={fP} sub="3-yr ~26%"/>
              <Sl l="PTET Rate" v={ptet} set={sPtet} mn={0} mx={0.10} st={0.005} f={fP}/>
            </Sc>
          </div>
          <div>
            <Sc t="Fixed Overhead (Non-Payroll)">
              <Rw>
                <Fd l="Rent" v={rent} set={sRent}/><Fd l="Insurance" v={ins} set={sIns}/>
                <Fd l="Tech & Phone" v={tech} set={sTech}/><Fd l="Accounting" v={acct} set={sAcct}/>
                <Fd l="fCFO" v={fcfo} set={sFcfo}/><Fd l="Advertising" v={ads} set={sAds} sub="Target $100K"/>
                <Fd l="Travel & Ent" v={trav} set={sTrav}/><Fd l="Other" v={oth} set={sOth}/>
                <Fd l="Bank Fees" v={bank} set={sBank}/><Fd l="Dues" v={dues} set={sDues}/>
                <Fd l="Postage" v={post} set={sPost}/><Fd l="Taxes & Lic" v={txLc} set={sTxLc}/>
                <Fd l="Training" v={trn} set={sTrn}/><Fd l="Placement" v={plc} set={sPlc}/>
              </Rw>
              <div style={{marginTop: 6, padding: "7px 10px", background: "#181b23", borderRadius: 6,
                border: "1px solid #2a2d38", display: "flex", justifyContent: "space-between",
                fontWeight: 700, fontSize: 12}}>
                <span>Non-Payroll OH</span>
                <span style={{fontFamily: M, color: "#fbbf24"}}>{fm(tOH)}</span>
              </div>
              <div style={{marginTop: 4, padding: "7px 10px", background: "#181b23", borderRadius: 6,
                border: "1px solid #5b8af5", display: "flex", justifyContent: "space-between",
                fontWeight: 700, fontSize: 12}}>
                <span>Total Expenses (Payroll + OH)</span>
                <span style={{fontFamily: M, color: "#5b8af5"}}>{fm(tExp)}</span>
              </div>
            </Sc>
            <Sc t={hasBlend ? "P&L Waterfall (Blended: " + plMoCount + "mo actual + " + remainMo + "mo model)" : "P&L Waterfall (Model)"}>
              <Br l="Revenue" v={hasBlend ? bRevFull : tRev} mx={Math.max(tRev, hasBlend ? bRevFull : 0)} c="#5b8af5"/>
              <Br l="COGS" v={hasBlend ? bCogsFull : tRev - gp} mx={Math.max(tRev, hasBlend ? bRevFull : 0)} c="#f87171"/>
              <Br l={"Gross Profit (" + fP(hasBlend ? bGPMFull : gpm) + ")"} v={hasBlend ? bGPFull : gp} mx={Math.max(tRev, hasBlend ? bRevFull : 0)} c="#4ade80"/>
              <Br l="Payroll (core)" v={tPay} mx={hasBlend ? bGPFull : gp} c="#fbbf24"/>
              <Br l="Non-Payroll OH" v={tOH} mx={hasBlend ? bGPFull : gp} c="#f59e0b"/>
              {instOn && <Br l={"Install Div Savings (" + Math.round(tCap).toLocaleString() + " sf)"}
                v={Math.max(0, intSv)} mx={hasBlend ? bGPFull : gp} c="#22d3ee"/>}
              <div style={{marginTop: 4, padding: "7px 10px", background: "#181b23", borderRadius: 6,
                border: "1px solid " + ((hasBlend ? bNIFull : companyNI) >= 0 ? "#4ade80" : "#f87171"),
                display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 12}}>
                <span>Net Income {hasBlend ? "(Blended)" : instOn ? "(w/ Install)" : "(Core)"}</span>
                <span style={{fontFamily: M, color: (hasBlend ? bNIFull : companyNI) >= 0 ? "#4ade80" : "#f87171"}}>
                  {fm(hasBlend ? bNIFull : companyNI)}</span>
              </div>
              {hasBlend && <div style={{marginTop: 6, fontSize: 9, color: "#6b7280", padding: "6px 8px",
                background: "#0f1117", borderRadius: 5}}>
                <div>Actual ({plMoCount}mo): Rev {fm(plActRev)} | GP {fm(plActGP)} ({fP(plActGPM)}) | Exp {fm(plActExp)}</div>
                <div>Model ({remainMo}mo): Rev {fm(projMonthlyRev * remainMo)} | GP {fm((gp/12) * remainMo)} ({fP(gpm)}) | Exp {fm(projMonthlyExp * remainMo)}</div>
                <div style={{marginTop: 2, color: "#5b8af5"}}>Model-only NI: {fm(companyNI)} | Blended NI: {fm(bNIFull)}</div>
              </div>}
            </Sc>
            <Sc t="Install Division">
              <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
                <span style={{fontSize: 11, color: "#9ca3af"}}>Include in P&L?</span>
                <button onClick={() => setInstOn(!instOn)}
                  style={{padding: "4px 14px", borderRadius: 5, border: "none",
                    background: instOn ? "#4ade80" : "#f87171", color: "#000",
                    fontSize: 10, fontWeight: 700, cursor: "pointer"}}>{instOn ? "ON" : "OFF"}</button>
              </div>
              {instOn && <div style={{fontSize: 10}}>
                <St l="All-in Crew COGS" v={fm(tInt)} c="#fbbf24"/>
                <St l="Equivalent Sub Cost" v={fm(subCS)}/>
                <St l={"GP Uplift (" + Math.round(tCap).toLocaleString() + " sf)"}
                  v={(intSv >= 0 ? "+" : "") + fm(intSv)} c={intSv >= 0 ? "#4ade80" : "#f87171"}/>
                <St l="Cost/sqft (all-in)" v={"$" + iPsf.toFixed(2)} c="#e8eaed"/>
                <St l="Sub PO rate" v={"$" + subRt.toFixed(2)}/>
              </div>}
            </Sc>
          </div>
        </Rw>}

        {/* ═══ TAB 1: TEAM ═══ */}
        {tab === 1 && <Rw>
          <div>
            <Sc t="Staff">
              {staff.map(s => {
                const sc = staffC.find(x => x.id === s.id);
                const isConf = confirmDel && confirmDel.type === 'staff' && confirmDel.id === s.id;
                return <div key={s.id} style={{marginBottom: 8, padding: "10px 12px", background: "#181b23",
                  borderRadius: 7, border: "1px solid " + (isConf ? "#f87171" : "#2a2d38")}}>
                  {s.type === 'hourly'
                    ? <Sl l={s.name + " (" + s.role + ") hrs/wk"} v={s.hrsWk} set={v => updStaff(s.id, 'hrsWk', v)}
                        mn={0} mx={40} st={5} f={v => v + "h"}
                        sub={"$" + s.rate + "/hr = " + fm(sc ? sc.ann : 0) + "/yr"}/>
                    : <div>
                        <Sl l={s.name + " (" + s.role + ")"} v={s.base} set={v => updStaff(s.id, 'base', v)}
                          mn={30000} mx={200000} st={1000}/>
                        {s.bonus > 0 || s.id === 'caleb' ? <Fd l={s.name + " Bonus"} v={s.bonus}
                          set={v => updStaff(s.id, 'bonus', v)}/> : null}
                      </div>
                  }
                  <div style={{display: "flex", justifyContent: "flex-end", marginTop: 4}}>
                    {isConf
                      ? <div style={{display: "flex", gap: 6, alignItems: "center"}}>
                          <span style={{fontSize: 10, color: "#f87171"}}>Remove {s.name}?</span>
                          <button onClick={() => removeStaffMem(s.id)}
                            style={{padding: "3px 10px", borderRadius: 4, background: "#f87171",
                              color: "#fff", fontSize: 9, fontWeight: 700, border: "none", cursor: "pointer"}}>Yes, Remove</button>
                          <button onClick={() => setConfirmDel(null)}
                            style={{padding: "3px 10px", borderRadius: 4, background: "#2a2d38",
                              color: "#9ca3af", fontSize: 9, fontWeight: 600, border: "none", cursor: "pointer"}}>Cancel</button>
                        </div>
                      : <button onClick={() => setConfirmDel({type:'staff', id:s.id})}
                          style={{padding: "3px 10px", borderRadius: 4, border: "1px solid #2a2d38",
                            background: "none", color: "#6b7280", fontSize: 9, cursor: "pointer"}}>Remove</button>
                    }
                  </div>
                </div>;
              })}
              <button onClick={() => setShowAddStaff(!showAddStaff)}
                style={{padding: "5px 12px", borderRadius: 5, background: "#4ade80",
                  color: "#000", fontSize: 10, fontWeight: 700, border: "none", cursor: "pointer", marginTop: 4}}>+ Add Staff</button>
              {showAddStaff && <div style={{background: "#181b23", borderRadius: 8, padding: 12,
                border: "1px solid #4ade80", marginTop: 8}}>
                <div style={{fontSize: 11, fontWeight: 700, color: "#4ade80", marginBottom: 6}}>New Staff Member</div>
                <Tx l="Name" v={newStaffMem.name} set={v => setNewStaffMem({...newStaffMem, name: v})}/>
                <Tx l="Role" v={newStaffMem.role} set={v => setNewStaffMem({...newStaffMem, role: v})}/>
                <Tx l="Type" v={newStaffMem.type} set={v => setNewStaffMem({...newStaffMem, type: v})} opts={["salary", "hourly"]}/>
                {newStaffMem.type === 'salary'
                  ? <Tx l="Base Salary" v={newStaffMem.base} set={v => setNewStaffMem({...newStaffMem, base: v})} type="number"/>
                  : <><Tx l="Hourly Rate" v={newStaffMem.rate} set={v => setNewStaffMem({...newStaffMem, rate: v})} type="number"/>
                     <Tx l="Hours/Week" v={newStaffMem.hrsWk} set={v => setNewStaffMem({...newStaffMem, hrsWk: v})} type="number"/></>}
                <Tx l="Bonus" v={newStaffMem.bonus} set={v => setNewStaffMem({...newStaffMem, bonus: v})} type="number"/>
                <div style={{display: "flex", gap: 8, alignItems: "center", marginBottom: 6}}>
                  <label style={{fontSize: 10, color: "#9ca3af"}}><input type="checkbox" checked={newStaffMem.in401k}
                    onChange={e => setNewStaffMem({...newStaffMem, in401k: e.target.checked})}/> 401k Eligible</label>
                  {newStaffMem.in401k && <Tx l="401k Fraction" v={newStaffMem.f401k}
                    set={v => setNewStaffMem({...newStaffMem, f401k: v})} type="number"/>}
                </div>
                <button onClick={addNewStaff}
                  style={{padding: "6px 16px", borderRadius: 5, background: "#4ade80",
                    color: "#000", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>Save</button>
              </div>}
            </Sc>
            <Sc t="Rep Compensation">
              {reps.map(r => {
                const rc = repC.find(x => x.id === r.id);
                const isConf = confirmDel && confirmDel.type === 'rep' && confirmDel.id === r.id;
                return <div key={r.id} style={{marginBottom: 8, padding: "10px 12px", background: "#181b23",
                  borderRadius: 7, border: "1px solid " + (isConf ? "#f87171" : "#2a2d38")}}>
                  <Sl l={r.name + " Base (" + r.market + ")"} v={r.base} set={v => updRep(r.id, 'base', v)}
                    mn={30000} mx={150000} st={1000}
                    sub={r.moActive < 12 ? "Prorated " + r.moActive + "mo = " + fm(rc ? rc.proBase : 0) : undefined}/>
                  <div style={{display: "flex", justifyContent: "flex-end", marginTop: 4}}>
                    {isConf
                      ? <div style={{display: "flex", gap: 6, alignItems: "center"}}>
                          <span style={{fontSize: 10, color: "#f87171"}}>Remove {r.name}?</span>
                          <button onClick={() => removeRep(r.id)}
                            style={{padding: "3px 10px", borderRadius: 4, background: "#f87171",
                              color: "#fff", fontSize: 9, fontWeight: 700, border: "none", cursor: "pointer"}}>Yes, Remove</button>
                          <button onClick={() => setConfirmDel(null)}
                            style={{padding: "3px 10px", borderRadius: 4, background: "#2a2d38",
                              color: "#9ca3af", fontSize: 9, fontWeight: 600, border: "none", cursor: "pointer"}}>Cancel</button>
                        </div>
                      : <button onClick={() => setConfirmDel({type:'rep', id:r.id})}
                          style={{padding: "3px 10px", borderRadius: 4, border: "1px solid #2a2d38",
                            background: "none", color: "#6b7280", fontSize: 9, cursor: "pointer"}}>Remove</button>
                    }
                  </div>
                </div>;
              })}
              <button onClick={() => setShowAddRep(!showAddRep)}
                style={{padding: "5px 12px", borderRadius: 5, background: "#4ade80",
                  color: "#000", fontSize: 10, fontWeight: 700, border: "none", cursor: "pointer", marginTop: 4}}>+ Add Sales Rep</button>
              {showAddRep && <div style={{background: "#181b23", borderRadius: 8, padding: 12,
                border: "1px solid #4ade80", marginTop: 8}}>
                <div style={{fontSize: 11, fontWeight: 700, color: "#4ade80", marginBottom: 6}}>New Sales Rep</div>
                <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 8px"}}>
                  <Tx l="Name" v={newRep.name} set={v => setNewRep({...newRep, name: v})}/>
                  <Tx l="Role" v={newRep.role} set={v => setNewRep({...newRep, role: v})}/>
                  <Tx l="Market" v={newRep.market} set={v => setNewRep({...newRep, market: v})} opts={["KC", "DSM", "STL"]}/>
                  <Tx l="Base Salary" v={newRep.base} set={v => setNewRep({...newRep, base: v})} type="number"/>
                  <Tx l="Car Type" v={newRep.carType} set={v => setNewRep({...newRep, carType: v})} opts={["annual", "monthly"]}/>
                  <Tx l="Car Amount" v={newRep.carAmt} set={v => setNewRep({...newRep, carAmt: v})} type="number"/>
                  <Tx l="Sales Goal" v={newRep.goal} set={v => setNewRep({...newRep, goal: v})} type="number"/>
                  <Tx l="Comm Threshold" v={newRep.threshold} set={v => setNewRep({...newRep, threshold: v})} type="number"/>
                  <Tx l="Bonus" v={newRep.bonus} set={v => setNewRep({...newRep, bonus: v})} type="number"/>
                  <Tx l="Months Active" v={newRep.moActive} set={v => setNewRep({...newRep, moActive: v})} type="number"/>
                </div>
                <div style={{display: "flex", gap: 8, alignItems: "center", marginBottom: 6}}>
                  <label style={{fontSize: 10, color: "#9ca3af"}}><input type="checkbox" checked={newRep.in401k}
                    onChange={e => setNewRep({...newRep, in401k: e.target.checked})}/> 401k Eligible</label>
                  {newRep.in401k && <Tx l="401k Fraction" v={newRep.f401k}
                    set={v => setNewRep({...newRep, f401k: v})} type="number"/>}
                </div>
                <button onClick={addNewRep}
                  style={{padding: "6px 16px", borderRadius: 5, background: "#4ade80",
                    color: "#000", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>Save</button>
              </div>}
            </Sc>
          </div>
          <div>
            <Sc t="Payroll Summary">
              <St l="Base Comp (salary + car + bonus)" v={fm(tW + tCar + tBon)}/>
              <St l="Commissions" v={fm(tCom)}/>
              <St l="Total Comp" v={fm(tComp)}/>
              <St l="Payroll Tax (11%)" v={fm(prTx)}/>
              <St l="401k (3%)" v={fm(c401)}/>
              <div style={{display: "flex", justifyContent: "space-between", padding: "6px 0",
                fontWeight: 700, borderTop: "2px solid #5b8af5"}}>
                <span style={{color: "#5b8af5"}}>TOTAL PAYROLL</span>
                <span style={{fontFamily: M, color: "#5b8af5"}}>{fm(tPay)}</span>
              </div>
            </Sc>
            <Sc t="Commission (6% above threshold)">
              {repC.map(r =>
                <div key={r.id} style={{display: "flex", justifyContent: "space-between",
                  padding: "3px 0", borderBottom: "1px solid #2a2d38", fontSize: 10}}>
                  <span>{r.name}{r.role ? " (" + r.role + ")" : ""}</span>
                  <span style={{fontFamily: M}}>
                    {r.comm > 0
                      ? fm(r.goal - r.threshold) + " x 6% = " + fm(r.comm)
                      : <span style={{color: "#6b7280"}}>Below {fm(r.threshold)}</span>}
                  </span>
                </div>
              )}
            </Sc>
          </div>
        </Rw>}

        {/* ═══ TAB 2: REPS ═══ */}
        {tab === 2 && <div>
          <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(340px, 1fr))", gap: 12, marginBottom: 16}}>
            {repC.map(r =>
              <RepCard key={r.id} nm={r.name} rl={r.role} base={r.proBase} car={r.carAnn}
                sl={r.goal} thr={r.threshold} bon={r.bonus}
                nts={"Actual YTD: " + fm(aByR(r.name)) + (r.moActive < 12 ? " | " + fm(r.base) + " prorated " + r.moActive + "mo = " + fm(r.proBase) : "")}
                repId={r.id}/>
            )}
          </div>
          <Rw>
            <div>
              <Sc t="Budget vs Actual by Rep">
                {reps.map(r =>
                  <BvA key={r.id} l={r.name} b={r.goal} a={aByR(r.name)}/>
                )}
                <BvA l="House" b={houseGoal} a={houseActual}/>
                <div style={{height: 1, background: "#5b8af5", margin: "6px 0"}}/>
                <BvA l="TOTAL" b={tRev} a={aTot}/>
              </Sc>
            </div>
            <div>
              <Sc t="House Account">
                <St l="2026 Goal" v={fm(houseGoal)} c="#5b8af5"/>
                <St l="Actual YTD" v={fm(houseActual)} c="#4ade80"/>
                <St l="GP Generated" v={fm(houseActual * gpm)} c="#4ade80"/>
              </Sc>
            </div>
          </Rw>
        </div>}

        {/* ═══ TAB 3: INSTALL ═══ */}
        {tab === 3 && <Rw>
          <div>
            <Sc t="Crew Setup">
              <Sl l="Crew Members" v={crCt} set={sCrCt} mn={1} mx={6} f={v => v + " laborers"}/>

                f={v => "$" + v.toFixed(2) + "/hr"} sub="Blended avg across crew"/>
              <Fd l="Foreman Base Salary" v={fmBase} set={sFmBase}/>
              <Fd l="Foreman Expected Bonus" v={fmBon} set={sFmBon}
                sub={"Total comp: " + fm(fmBase + fmBon) + " | Tiers: $2.5K-$15K"}/>
              <Sl l="Start Month" v={crSt} set={sCrSt} mn={3} mx={8} f={v => mN[v]}
                sub={crMo + " mo active | " + Math.round(wkDy) + " install days"}/>
              <Sl l="Avg Sqft/Day" v={iRt} set={sIRt} mn={500} mx={1500} st={25}
                f={v => v + ""} sub="750/day target for bonus tiers"/>
              <Sl l="Season Weeks" v={wkW} set={sWkW} mn={30} mx={50} f={v => v + " wks"}/>
            </Sc>
            <Sc t="Equipment (monthly)">
              <Sl l="Truck" v={tPmt} set={sTPmt} mn={0} mx={2500} st={100}/>
              <Sl l="Skid" v={sPmt} set={sSPmt} mn={0} mx={2500} st={100}/>
              <Sl l="Fuel" v={fuel} set={sFuel} mn={0} mx={2500} st={100}/>
            </Sc>
            <Sc t="Burden, Insurance & Materials">
              <Sl l="Burden Rate (payroll tax+WC)" v={burdenRt} set={sBurdenRt}
                mn={0.15} mx={0.30} st={0.01} f={fP} sub="22% = 11% payroll + ~11% WC"/>
              <Fd l="Insurance (GL+vehicle+equip)" v={crIns} set={sCrIns}/>
              <Sl l="Consumables (tape,glue,tapcons)" v={consPsf} set={sConsPsf}
                mn={0} mx={1} st={0.05} f={v => "$" + v.toFixed(2) + "/sf"}
                sub={fm(consTotal) + " total"}/>
              <Sl l="Stone material" v={stonePsf} set={sStonePsf}
                mn={0} mx={1} st={0.05} f={v => "$" + v.toFixed(2) + "/sf"}
                sub={"$35/ton, 3-4\" depth | " + fm(stoneTotal) + " total"}/>
            </Sc>
          </div>
          <div>
            <Sc t="Install Volume & Revenue">
              <div style={{padding: 10, background: "#0f1117", borderRadius: 7, marginBottom: 10,
                border: "1px solid #5b8af5"}}>
                <Sl l="Total Install Sqft" v={Math.round(tCap)} set={v => setInstSfOver(v)}
                  mn={0} mx={500000} st={1000}
                  f={v => v.toLocaleString() + " sf"}
                  sub={instSfOver !== null
                    ? "Manual override (crew calc: " + Math.round(tCapCalc).toLocaleString() + " sf)"
                    : "From crew setup: " + Math.round(wkDy) + " days x " + iRt + " sf/day"}/>
                <Sl l="Total Install Revenue" v={Math.round(instRev)} set={v => {
                    const sf = subRt > 0 ? Math.round(v / subRt) : 0;
                    setInstSfOver(sf);
                  }}
                  mn={0} mx={3000000} st={5000}
                  sub={"@ $" + subRt.toFixed(2) + "/sf sub rate (markup excluded)"}/>
                <Sl l="Client Rate ($/sf)" v={clRt} set={sClRt} mn={3} mx={10} st={0.01}
                  f={v => "$" + v.toFixed(2) + "/sf"}
                  sub={"Default: $" + DEF_CL_RT.toFixed(2) + "/sf"}/>
                {clRt !== DEF_CL_RT && <button onClick={() => sClRt(DEF_CL_RT)}
                  style={{marginTop: 2, marginBottom: 4, padding: "4px 12px", borderRadius: 4, border: "1px solid #2a2d38",
                    background: "none", color: "#5b8af5", fontSize: 9, fontWeight: 600,
                    cursor: "pointer"}}>Reset to default (${DEF_CL_RT.toFixed(2)}/sf)</button>}
                <Sl l="Sub PO Rate ($/sf)" v={subRt} set={sSubRt} mn={2} mx={8} st={0.01}
                  f={v => "$" + v.toFixed(2) + "/sf"}
                  sub={"Default: $" + DEF_SUB_RT.toFixed(2) + "/sf"}/>
                {subRt !== DEF_SUB_RT && <button onClick={() => sSubRt(DEF_SUB_RT)}
                  style={{marginTop: 2, marginBottom: 4, padding: "4px 12px", borderRadius: 4, border: "1px solid #2a2d38",
                    background: "none", color: "#5b8af5", fontSize: 9, fontWeight: 600,
                    cursor: "pointer"}}>Reset to default (${DEF_SUB_RT.toFixed(2)}/sf)</button>}
                {instSfOver !== null && <button onClick={() => setInstSfOver(null)}
                  style={{marginTop: 4, padding: "4px 12px", borderRadius: 4, border: "1px solid #2a2d38",
                    background: "none", color: "#5b8af5", fontSize: 9, fontWeight: 600,
                    cursor: "pointer"}}>Reset to crew-calculated ({Math.round(tCapCalc).toLocaleString()} sf)</button>}
              </div>
              <div style={{display: "flex", gap: 8, flexWrap: "wrap"}}>
                <KP l="Install Sqft" v={Math.round(tCap).toLocaleString()} c="#5b8af5"/>
                <KP l="Install Revenue" v={fm(instRev)} c="#5b8af5"
                  sub={"@ $" + subRt.toFixed(2) + "/sf sub rate"}/>
                <KP l="Install COGS" v={fm(tInt)} c="#fbbf24"
                  sub={"@ $" + iPsf.toFixed(2) + "/sf"}/>
                <KP l="Install GP" v={fm(instRev - tInt)}
                  c={instRev - tInt >= 0 ? "#4ade80" : "#f87171"}
                  sub={instRev > 0 ? fP((instRev - tInt) / instRev) + " margin" : ""}/>
              </div>
            </Sc>
            <Sc t="Year 1 Capex">
              <St l="Down payments (20%)" v={fm(tDn)}/>
              <St l="Cash equip + tools" v={fm(sCap)}/>
              <div style={{display: "flex", justifyContent: "space-between", padding: "6px 0",
                fontWeight: 800, borderTop: "2px solid #5b8af5", marginTop: 4}}>
                <span>Total</span>
                <span style={{fontFamily: M, color: "#5b8af5"}}>{fm(yr1C)}</span>
              </div>
            </Sc>
            <Sc t="Full Cost Breakdown">
              <St l={"Crew burdened (" + fP(burdenRt) + ")"} v={fm(crLabBurd)}/>
              <St l={"Foreman burdened (" + fP(burdenRt) + ")"} v={fm(fmBurd)}/>
              <St l="Foreman bonus" v={fm(fmBon)}/>
              <St l={"Equipment (" + crMo + "mo)"} v={fm(eqC)}/>
              <St l="Insurance (GL+veh+equip)" v={fm(crInsP)}/>
              <St l={"Consumables ($" + consPsf.toFixed(2) + "/sf)"} v={fm(consTotal)}/>
              <St l={"Stone ($" + stonePsf.toFixed(2) + "/sf)"} v={fm(stoneTotal)}/>
              <div style={{display: "flex", justifyContent: "space-between", padding: "6px 0",
                fontWeight: 800, fontSize: 12, borderTop: "2px solid #fbbf24", marginTop: 4}}>
                <span>Total Install COGS</span>
                <span style={{fontFamily: M, color: "#fbbf24"}}>{fm(tInt)}</span>
              </div>
              <div style={{marginTop: 8, padding: 10, background: "#0f1117", borderRadius: 6, fontSize: 10}}>
                <St l="All-in cost/sqft" v={"$" + iPsf.toFixed(2) + "/sqft"} c="#e8eaed"/>
                <St l="Sub PO rate" v={"$" + subRt.toFixed(2) + "/sqft"}/>
                <St l="Savings per sqft" v={"$" + (subRt - iPsf).toFixed(2) + "/sqft"} c="#4ade80"/>
              </div>
            </Sc>
            <Sc t="Sub vs In-House">
              <Rw>
                <div style={{padding: 10, background: "#0f1117", borderRadius: 7, textAlign: "center"}}>
                  <div style={{fontSize: 9, color: "#6b7280", textTransform: "uppercase", marginBottom: 4}}>Sub</div>
                  <div style={{fontSize: 14, fontWeight: 700, fontFamily: M}}>{fP(subMr)}</div>
                  <div style={{fontSize: 10}}>GP: {fm(tCap * clRt - subCS)}</div>
                </div>
                <div style={{padding: 10, background: "#0f1117", borderRadius: 7, textAlign: "center",
                  border: "1px solid #4ade80"}}>
                  <div style={{fontSize: 9, color: "#4ade80", textTransform: "uppercase", marginBottom: 4}}>In-House</div>
                  <div style={{fontSize: 14, fontWeight: 700, fontFamily: M, color: "#4ade80"}}>{fP(intMr)}</div>
                  <div style={{fontSize: 10}}>GP: {fm(tCap * clRt - tInt)}</div>
                </div>
              </Rw>
              <div style={{marginTop: 10, textAlign: "center", padding: 10,
                background: intSv > 0 ? "rgba(74,222,128,0.08)" : "rgba(248,113,113,0.08)",
                borderRadius: 7}}>
                <div style={{fontSize: 10, color: "#6b7280"}}>
                  Annual Savings ({Math.round(tCap).toLocaleString()} sf)</div>
                <div style={{fontSize: 18, fontWeight: 800, fontFamily: M,
                  color: intSv > 0 ? "#4ade80" : "#f87171"}}>
                  {intSv >= 0 ? "+" : ""}{fm(intSv)}</div>
                <div style={{fontSize: 10, color: "#6b7280", marginTop: 3}}>
                  Net yr 1 (after {fm(yr1C)} capex):{" "}
                  <strong style={{fontFamily: M,
                    color: (intSv - yr1C) >= 0 ? "#4ade80" : "#fbbf24"}}>{fm(intSv - yr1C)}</strong>
                </div>
              </div>
            </Sc>
          </div>
        </Rw>}

        {/* ═══ TAB 4: SALES LOG ═══ */}
        {tab === 4 && (() => {
          const yrSales = sales.filter(s => s.y === logYr);
          const filtered = yrSales.filter(s =>
            (slFiltRep === "All" || s.r === slFiltRep) &&
            (slFiltMkt === "All" || matchMkt(s.m, slFiltMkt))
          ).sort((a, b) => a.d > b.d ? 1 : -1);
          const fTot = filtered.reduce((a, s) => a + s.a, 0);
          const fSf = filtered.reduce((a, s) => a + (s.sf || 0), 0);
          const projCt = filtered.filter(s => s.pm === "Proj").length;
          const matCt = filtered.filter(s => s.pm === "Mat").length;
          const rpCt = filtered.filter(s => s.rp && s.rp !== "").length;
          const logReps = [...new Set(yrSales.map(s => s.r))].sort();
          const mkts = [...new Set(yrSales.map(s => s.m))].sort();
          return <div>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center",
            marginBottom: 12, flexWrap: "wrap", gap: 8}}>
            <div style={{display: "flex", gap: 6, alignItems: "center"}}>
              {[2025, 2026].map(y =>
                <button key={y} onClick={() => { setLogYr(y); setSlFiltRep("All"); setSlFiltMkt("All"); }}
                  style={{padding: "5px 14px", borderRadius: 5, border: "1px solid #2a2d38",
                    background: logYr === y ? "#5b8af5" : "#181b23",
                    color: logYr === y ? "#fff" : "#6b7280", fontSize: 11,
                    fontWeight: 700, cursor: "pointer"}}>{y}</button>
              )}
              <select value={slFiltRep} onChange={e => setSlFiltRep(e.target.value)}
                style={{padding: "4px 8px", borderRadius: 4, border: "1px solid #2a2d38",
                  background: "#1e2130", color: slFiltRep !== "All" ? "#5b8af5" : "#6b7280", fontSize: 10}}>
                <option value="All">All Reps</option>
                {logReps.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
              <select value={slFiltMkt} onChange={e => setSlFiltMkt(e.target.value)}
                style={{padding: "4px 8px", borderRadius: 4, border: "1px solid #2a2d38",
                  background: "#1e2130", color: slFiltMkt !== "All" ? "#5b8af5" : "#6b7280", fontSize: 10}}>
                <option value="All">All Markets</option>
                {mkts.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <div style={{display: "flex", gap: 8, alignItems: "center"}}>
              <span style={{fontSize: 10, color: "#6b7280"}}>
                {filtered.length} projects | {fm(fTot)} | {fSf.toLocaleString()} sqft
              </span>
              <button onClick={exportSalesCSV}
                style={{padding: "4px 10px", borderRadius: 4, border: "1px solid #2a2d38",
                  background: "#181b23", color: "#5b8af5", fontSize: 9, fontWeight: 600, cursor: "pointer"}}>
                Export CSV</button>
              {logYr === 2026 &&
                <button onClick={() => setShowAdd(!showAdd)}
                  style={{padding: "5px 12px", borderRadius: 5,
                    background: scenario ? "#f59e0b" : "#4ade80",
                    color: "#000", fontSize: 10, fontWeight: 700, border: "none",
                    cursor: "pointer"}}>{scenario ? "+ Add Test Sale" : "+ Add Sale"}</button>}
            </div>
          </div>

          {/* Breakdown stats */}
          <div style={{display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap"}}>
            <div style={{background: "#181b23", borderRadius: 6, padding: "6px 12px", border: "1px solid #2a2d38", fontSize: 10}}>
              <span style={{color: "#6b7280"}}>Proj: </span>
              <span style={{fontFamily: M, fontWeight: 600}}>{projCt}</span>
              <span style={{color: "#6b7280"}}> ({filtered.length > 0 ? ((projCt / filtered.length) * 100).toFixed(0) : 0}%)</span>
              <span style={{color: "#6b7280"}}> | Mat: </span>
              <span style={{fontFamily: M, fontWeight: 600}}>{matCt}</span>
              <span style={{color: "#6b7280"}}> ({filtered.length > 0 ? ((matCt / filtered.length) * 100).toFixed(0) : 0}%)</span>
            </div>
            <div style={{background: "#181b23", borderRadius: 6, padding: "6px 12px", border: "1px solid #2a2d38", fontSize: 10}}>
              <span style={{color: "#6b7280"}}>Rep Projects (AB/ABC): </span>
              <span style={{fontFamily: M, fontWeight: 600, color: "#5b8af5"}}>{rpCt}</span>
              <span style={{color: "#6b7280"}}> ({filtered.length > 0 ? ((rpCt / filtered.length) * 100).toFixed(0) : 0}%) | </span>
              <span style={{color: "#6b7280"}}>Non-RP: </span>
              <span style={{fontFamily: M, fontWeight: 600}}>{filtered.length - rpCt}</span>
              <span style={{color: "#6b7280"}}> ({filtered.length > 0 ? (((filtered.length - rpCt) / filtered.length) * 100).toFixed(0) : 0}%)</span>
            </div>
            <div style={{background: "#181b23", borderRadius: 6, padding: "6px 12px", border: "1px solid #2a2d38", fontSize: 10}}>
              <span style={{color: "#6b7280"}}>RP $: </span>
              <span style={{fontFamily: M, fontWeight: 600, color: "#5b8af5"}}>{fm(filtered.filter(s => s.rp).reduce((a, s) => a + s.a, 0))}</span>
              <span style={{color: "#6b7280"}}> ({fTot > 0 ? ((filtered.filter(s => s.rp).reduce((a, s) => a + s.a, 0) / fTot) * 100).toFixed(0) : 0}% of $)</span>
            </div>
          </div>

          {showAdd && <div style={{background: "#181b23", borderRadius: 8, padding: 14,
            border: "1px solid #4ade80", marginBottom: 12}}>
            <div style={{fontSize: 12, fontWeight: 700, color: "#4ade80", marginBottom: 8}}>New Sale</div>
            <div style={{display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "0 10px"}}>
              <Tx l="Job #" v={nS.id} set={v => sNS({...nS, id: v})}/>
              <Tx l="Project Name" v={nS.name} set={v => sNS({...nS, name: v})}/>
              <Tx l="Amount" v={nS.a} set={v => sNS({...nS, a: v})} type="number"/>
              <Tx l="Date" v={nS.d} set={v => sNS({...nS, d: v})} type="date"/>
              <Tx l="Proj/Mat" v={nS.pm} set={v => sNS({...nS, pm: v})} opts={["Proj", "Mat"]}/>
              <Tx l="Rep" v={nS.r} set={v => sNS({...nS, r: v})}
                opts={[...new Set([...reps.map(r => r.name), "House", ...sales.map(s => s.r)])].sort()}/>
              <Tx l="Market" v={nS.m} set={v => sNS({...nS, m: v})} opts={["KC", "DSM", "STL", "IA"]}/>
              <Tx l="Rep Project" v={nS.rp} set={v => sNS({...nS, rp: v})} opts={["", "AB", "ABC"]}/>
              <Tx l="Sqft" v={nS.sf} set={v => sNS({...nS, sf: v})} type="number"/>
              <Tx l="Note" v={nS.nt} set={v => sNS({...nS, nt: v})}/>
            </div>
            <button onClick={addSale}
              style={{marginTop: 6, padding: "7px 20px", borderRadius: 5, background: "#4ade80",
                color: "#000", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>Save</button>
          </div>}

          {editSale && <div style={{background: "#181b23", borderRadius: 8, padding: 14,
            border: "1px solid #5b8af5", marginBottom: 12}}>
            <div style={{fontSize: 12, fontWeight: 700, color: "#5b8af5", marginBottom: 8}}>Edit Sale: {editSale.name}</div>
            <div style={{display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "0 10px"}}>
              <Tx l="Job #" v={editSale.id} set={v => setEditSale({...editSale, id: v})}/>
              <Tx l="Project Name" v={editSale.name} set={v => setEditSale({...editSale, name: v})}/>
              <Tx l="Amount" v={editSale.a} set={v => setEditSale({...editSale, a: v})} type="number"/>
              <Tx l="Date" v={editSale.d} set={v => setEditSale({...editSale, d: v})} type="date"/>
              <Tx l="Proj/Mat" v={editSale.pm} set={v => setEditSale({...editSale, pm: v})} opts={["Proj", "Mat"]}/>
              <Tx l="Rep" v={editSale.r} set={v => setEditSale({...editSale, r: v})}
                opts={[...new Set([...reps.map(r => r.name), "House", ...sales.map(s => s.r)])].sort()}/>
              <Tx l="Market" v={editSale.m} set={v => setEditSale({...editSale, m: v})} opts={["KC", "DSM", "STL", "IA"]}/>
              <Tx l="Rep Project" v={editSale.rp} set={v => setEditSale({...editSale, rp: v})} opts={["", "AB", "ABC"]}/>
              <Tx l="Sqft" v={editSale.sf} set={v => setEditSale({...editSale, sf: v})} type="number"/>
              <Tx l="Note" v={editSale.nt} set={v => setEditSale({...editSale, nt: v})}/>
            </div>
            <div style={{display: "flex", gap: 8, marginTop: 6}}>
              <button onClick={saveEdit}
                style={{padding: "7px 20px", borderRadius: 5, background: "#5b8af5",
                  color: "#fff", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>Save Changes</button>
              <button onClick={() => setEditSale(null)}
                style={{padding: "7px 20px", borderRadius: 5, background: "#2a2d38",
                  color: "#9ca3af", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>Cancel</button>
            </div>
          </div>}

          {logYr === 2026 && <div style={{marginBottom: 12}}>
            {reps.map(r => <BvA key={r.id} l={r.name} b={r.goal} a={aByR(r.name)}/>)}
            <BvA l="House" b={houseGoal} a={houseActual}/>
            <BvA l="TOTAL" b={tRev} a={aTot}/>
          </div>}

          <div style={{overflowX: "auto"}}>
            <table style={{width: "100%", borderCollapse: "collapse", fontSize: 10, minWidth: 900}}>
              <thead>
                <tr style={{borderBottom: "2px solid #2a2d38", background: "#0f1117"}}>
                  {["#", "Project", "Amount", "Date", "P/M", "Rep", "Mkt", "RP", "Sqft", "Note", ""].map(h =>
                    <th key={h} style={{padding: "5px 6px",
                      textAlign: ["Amount", "Sqft"].includes(h) ? "right" : "left",
                      color: "#6b7280", fontWeight: 600, fontSize: 9, textTransform: "uppercase",
                      whiteSpace: "nowrap"}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {filtered.map((s, i) => {
                  const key = logYr + "-" + i + "-" + s.id;
                  const rows = [];
                  rows.push(
                    <tr key={"r" + key} style={{borderBottom: "1px solid #2a2d38", cursor: "pointer"}}
                      onClick={() => toggleExp(key)}>
                      <td style={{padding: "5px 6px", fontSize: 9, color: "#6b7280"}}>{s.id}</td>
                      <td style={{padding: "5px 6px", fontWeight: 500}}>
                        {s._scenario && <span style={{background:'#f59e0b', color:'#000', fontSize:8,
                          fontWeight:700, padding:'1px 4px', borderRadius:3, marginRight:4}}>TEST</span>}
                        {s.name}</td>
                      <td style={{padding: "5px 6px", textAlign: "right", fontFamily: M,
                        fontWeight: 600, color: "#4ade80"}}>{fm(s.a)}</td>
                      <td style={{padding: "5px 6px", fontSize: 9, color: "#6b7280", whiteSpace: "nowrap"}}>{s.d}</td>
                      <td style={{padding: "5px 6px", fontSize: 9}}>{s.pm}</td>
                      <td style={{padding: "5px 6px", fontWeight: 600, color: "#5b8af5"}}>{s.r}</td>
                      <td style={{padding: "5px 6px", fontSize: 9}}>{s.m}</td>
                      <td style={{padding: "5px 6px", fontSize: 9,
                        color: s.rp ? "#5b8af5" : "#2a2d38"}}>{s.rp || "-"}</td>
                      <td style={{padding: "5px 6px", textAlign: "right", fontFamily: M, fontSize: 9}}>
                        {s.sf ? s.sf.toLocaleString() : "-"}</td>
                      <td style={{padding: "5px 6px", fontSize: 9, color: "#6b7280", maxWidth: 200}}>
                        {s.nt || ""}</td>

                              const {data:old} = await supabase.from('sales').select('*').eq('id', s._dbId).single();

                      <tr key={"e" + key}>

                              .map(x => <span key={x[0]} style={{color: "#9ca3af"}}>
                                {x[0]}: <strong style={{color: "#e8eaed", fontFamily: M}}>{fm(x[1])}</strong>
                              </span>)}
                            {s.nt && <span style={{color: "#9ca3af"}}>
                              Note: <em style={{color: "#e8eaed"}}>{s.nt}</em></span>}
                          </div>
                        </td>
                      </tr>
                    );

                  return rows;

              </tbody>
            </table>
          </div>
        </div>;
        })()}

        {/* ═══ TAB 5: INSTALL LOG ═══ */}
        {tab === 5 && <div>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12}}>

              <button onClick={() => setShowPO(!showPO)}

                  background: scenario ? "#f59e0b" : "#4ade80",

                {scenario ? "+ Add Test PO" : "+ Add PO"}</button>
            </div>
          </div>
          {showPO && <div style={{background: "#181b23", borderRadius: 8, padding: 14,

            <div style={{display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 10px"}}>
              <Tx l="Project" v={nP.project} set={v => sNP({...nP, project: v})}/>
              <Tx l="Sub" v={nP.sub} set={v => sNP({...nP, sub: v})}
                opts={["RCG", "Ripke", "Focal Point", "In-House"]}/>
              <Tx l="Amount" v={nP.amount} set={v => sNP({...nP, amount: v})} type="number"/>
              <Tx l="Sqft" v={nP.sqft} set={v => sNP({...nP, sqft: v})} type="number"/>
              <Tx l="Date" v={nP.date} set={v => sNP({...nP, date: v})} type="date"/>
              <Tx l="Note" v={nP.note} set={v => sNP({...nP, note: v})}/>

            <button onClick={addPO}
              style={{marginTop: 6, padding: "7px 20px", borderRadius: 5, background: "#4ade80",

          </div>}

          <Sc t="Summary by Sub">
            {["RCG", "Ripke", "Focal Point", "In-House"].map(sub => {
              const ps = i26.filter(i => i.sub === sub);
              const t = ps.reduce((a, p) => a + p.amount, 0);
              const sf = ps.reduce((a, p) => a + (p.sqft || 0), 0);
              return (
                <div key={sub} style={{display: "flex", justifyContent: "space-between",
                  padding: "5px 0", borderBottom: "1px solid #2a2d38", fontSize: 11}}>
                  <span style={{fontWeight: 600}}>{sub}</span>
                  <span style={{fontFamily: M}}>{ps.length} POs | {fm(t)} | {sf.toLocaleString()} sf</span>
                </div>
              );
            })}
          </Sc>

          {i26.length > 0 && <table style={{width: "100%", borderCollapse: "collapse", fontSize: 11}}>
            <thead>
              <tr style={{borderBottom: "2px solid #2a2d38"}}>
                {["Project", "Sub", "Amount", "Sqft", "$/sf", "Date", "Note", ""].map(h =>
                  <th key={h} style={{padding: "4px 6px",
                    textAlign: ["Amount", "Sqft", "$/sf"].includes(h) ? "right" : "left",
                    color: "#6b7280", fontWeight: 600, fontSize: 9, textTransform: "uppercase"}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {i26.sort((a, b) => a.date > b.date ? 1 : -1).map((p, i) =>
                <tr key={i} style={{borderBottom: "1px solid #2a2d38"}}>
                  <td style={{padding: "4px 6px"}}>{p.project}</td>
                  <td style={{padding: "4px 6px", color: "#5b8af5"}}>{p.sub}</td>
                  <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M,
                    color: "#fbbf24"}}>{fm(p.amount)}</td>
                  <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M}}>
                    {p.sqft ? p.sqft.toLocaleString() : "-"}</td>
                  <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M, fontSize: 9}}>
                    {p.sqft ? "$" + (p.amount / p.sqft).toFixed(2) : "-"}</td>
                  <td style={{padding: "4px 6px", fontSize: 9, color: "#6b7280"}}>{p.date}</td>
                  <td style={{padding: "4px 6px", fontSize: 9, color: "#6b7280"}}>{p.note}</td>
                  <td><button onClick={async () => {
                    const po = i26.sort((a, b) => a.date > b.date ? 1 : -1)[i];
                    if (po && po._dbId) {
                      const {data:old} = await supabase.from('install_pos').select('*').eq('id', po._dbId).single();
                      const {error} = await supabase.from('install_pos').delete().eq('id', po._dbId);
                      if (error) { alert('Delete failed: ' + error.message); return; }
                      if (old) pushUndo({type:'delete_po', row:old});
                    }
                    setInstLog(prev => prev.filter(x => x !== po));
                  }} style={{background: "none", border: "none", color: "#f87171",
                    cursor: "pointer", fontSize: 11}}>x</button></td>
                </tr>
              )}
            </tbody>
          </table>}
          {i26.length === 0 &&
            <div style={{textAlign: "center", padding: 30, color: "#6b7280", fontSize: 12}}>
              No POs yet. Click + Add PO.</div>}
        </div>}

        {/* ═══ TAB 6: JOB COSTING ═══ */}
        {tab === 6 && (() => {
          const allProj = sales.filter(s => s.y === 2026);
          const selProj = allProj.find(s => s.id === jcProj || s.name === jcProj);
          const projCosts = jobCosts.find(j => j.projId === jcProj);
          const allItems = [...(projCosts ? projCosts.items : []), ...jcItems];
          const matItems = allItems.filter(i => i.cat === "Material");
          const labItems = allItems.filter(i => i.cat === "Labor");
          const subItems = allItems.filter(i => i.cat === "Subcontractor");
          const eqItems = allItems.filter(i => i.cat === "Equipment");
          const othItems = allItems.filter(i => i.cat === "Other");
          const totalCost = allItems.reduce((a, i) => a + i.cost, 0);
          const revenue = selProj ? selProj.a : 0;
          const gpAmt = revenue - totalCost;
          const gpPct = revenue > 0 ? gpAmt / revenue : 0;
          const sfTotal = selProj ? (selProj.sf || 0) : 0;
          const costPsf = sfTotal > 0 ? totalCost / sfTotal : 0;
          const ohRate = jcOhPct !== null ? jcOhPct : (tRev > 0 ? tExp / tRev : 0);
          const ohAlloc = revenue * ohRate;
          const netAmt = gpAmt - ohAlloc;
          const netPct = revenue > 0 ? netAmt / revenue : 0;

          const CostTable = ({items, label}) => items.length > 0 ? (
            <div style={{marginBottom: 12}}>
              <div style={{fontSize: 10, fontWeight: 700, color: "#5b8af5", textTransform: "uppercase",
                letterSpacing: 1, marginBottom: 4}}>{label}</div>
              <table style={{width: "100%", borderCollapse: "collapse", fontSize: 10}}>
                <thead>
                  <tr style={{borderBottom: "1px solid #2a2d38"}}>
                    <th style={{padding: "3px 6px", textAlign: "left", color: "#6b7280", fontSize: 9}}>Description</th>
                    {label === "Labor"
                      ? <><th style={{padding: "3px 6px", textAlign: "right", color: "#6b7280", fontSize: 9}}>Hours</th>
                         <th style={{padding: "3px 6px", textAlign: "right", color: "#6b7280", fontSize: 9}}>Rate</th></>
                      : <><th style={{padding: "3px 6px", textAlign: "right", color: "#6b7280", fontSize: 9}}>Qty</th>
                         <th style={{padding: "3px 6px", textAlign: "right", color: "#6b7280", fontSize: 9}}>Unit $</th></>
                    }
                    <th style={{padding: "3px 6px", textAlign: "right", color: "#6b7280", fontSize: 9}}>Total</th>
                    <th style={{width: 24}}></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it, idx) => (
                    <tr key={it.id || idx} style={{borderBottom: "1px solid #2a2d38"}}>
                      <td style={{padding: "4px 6px"}}>{it.desc}</td>
                      <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M}}>
                        {label === "Labor" ? it.hrs : it.qty}</td>
                      <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M}}>
                        {label === "Labor" ? fm(it.rate) : fm(it.unit)}</td>
                      <td style={{padding: "4px 6px", textAlign: "right", fontFamily: M, fontWeight: 600,
                        color: "#fbbf24"}}>{fm(it.cost)}</td>
                      <td style={{padding: "4px 6px"}}>
                        <button onClick={() => {
                          if (jcItems.find(j => j.id === it.id)) {
                            setJcItems(p => p.filter(j => j.id !== it.id));
                          } else {
                            setJobCosts(p => p.map(j => j.projId === jcProj
                              ? {...j, items: j.items.filter(x => x.id !== it.id)} : j));
                          }
                        }} style={{background: "none", border: "none", color: "#f87171",
                          cursor: "pointer", fontSize: 11}}>x</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{display: "flex", justifyContent: "flex-end", padding: "4px 6px",
                fontFamily: M, fontWeight: 700, fontSize: 11}}>
                Subtotal: {fm(items.reduce((a, i) => a + i.cost, 0))}
              </div>
            </div>
          ) : null;

          return <div>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14}}>
              <h2 style={{margin: 0, fontSize: 14, fontWeight: 700}}>Job Costing</h2>
              <div style={{fontSize: 10, color: "#6b7280"}}>
                {jobCosts.length} projects costed</div>
            </div>

            {/* Project selector */}
            <div style={{marginBottom: 14}}>
              <label style={{fontSize: 11, color: "#9ca3af", fontWeight: 500, display: "block", marginBottom: 4}}>
                Select Project</label>
              <select value={jcProj} onChange={e => { setJcProj(e.target.value); setJcItems([]); }}
                style={{width: "100%", maxWidth: 400, padding: "6px 10px", borderRadius: 5,
                  border: "1px solid #2a2d38", background: "#1e2130", color: "#e8eaed", fontSize: 12}}>
                <option value="">-- Choose a 2026 project --</option>
                {allProj.sort((a, b) => a.name > b.name ? 1 : -1).map(s =>
                  <option key={s.id} value={s.id}>{s.id} - {s.name} ({fm(s.a)})</option>
                )}
              </select>
            </div>

            {/* Upload area */}
            {jcProj && <div style={{display: "flex", gap: 10, alignItems: "center", marginBottom: 14, flexWrap: "wrap"}}>
              <label style={{padding: "7px 16px", borderRadius: 6, background: "#5b8af5",
                color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", display: "inline-block"}}>
                Upload .xls / .xlsx
                <input type="file" accept=".xls,.xlsx,.csv" style={{display: "none"}}
                  onChange={e => { if (e.target.files[0]) { setJcUploadMsg(""); parseUploadedFile(e.target.files[0]); e.target.value = ""; }}}/>
              </label>
              <span style={{fontSize: 10, color: "#6b7280"}}>
                Supports Buildertrend EstimateReport & Job Costing Budget Cost Summary</span>
              {jcUploadMsg && <span style={{fontSize: 10, color: "#4ade80", fontWeight: 600}}>{jcUploadMsg}</span>}
            </div>}

            {selProj && <div>
              {/* Project header card */}
              <div style={{display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap"}}>
                <KP l="Revenue" v={fm(revenue)} c="#5b8af5"/>
                <KP l="Total Cost (COGS)" v={fm(totalCost)} c="#fbbf24"/>
                <KP l="Gross Profit" v={fm(gpAmt)} c={gpAmt >= 0 ? "#4ade80" : "#f87171"}
                  sub={fP(gpPct) + " margin"}/>
                <KP l="OH Allocation" v={fm(ohAlloc)} c="#f59e0b"
                  sub={fP(ohRate) + " of revenue"}/>
                <KP l="Net Profit" v={fm(netAmt)}
                  c={netAmt >= 0 ? "#4ade80" : "#f87171"}
                  sub={fP(netPct) + " net margin"}/>
                <KP l="Cost / Sqft" v={sfTotal > 0 ? "$" + costPsf.toFixed(2) : "N/A"}
                  sub={sfTotal > 0 ? sfTotal.toLocaleString() + " sqft" : "No sqft entered"}/>
              </div>

              <Rw>
                <div>
                  {/* Cost line items */}
                  <CostTable items={matItems} label="Material"/>
                  <CostTable items={labItems} label="Labor"/>
                  <CostTable items={subItems} label="Subcontractor"/>
                  <CostTable items={eqItems} label="Equipment"/>
                  <CostTable items={othItems} label="Other"/>

                  {allItems.length > 0 && <div style={{padding: "10px 12px", background: "#181b23",
                    borderRadius: 8, border: "1px solid " + (netAmt >= 0 ? "#4ade80" : "#f87171"),
                    marginBottom: 14}}>
                    <div style={{fontSize: 11}}>
                      <St l="Revenue" v={fm(revenue)} c="#5b8af5"/>
                      <St l="Total COGS" v={fm(totalCost)} c="#fbbf24"/>
                      <St l="Gross Profit" v={fm(gpAmt) + " (" + fP(gpPct) + ")"} c={gpAmt >= 0 ? "#4ade80" : "#f87171"}/>
                      <St l={"OH Allocation (" + fP(ohRate) + ")"} v={fm(ohAlloc)} c="#f59e0b"/>
                      <div style={{display: "flex", justifyContent: "space-between", padding: "6px 0",
                        fontWeight: 800, fontSize: 12, borderTop: "2px solid " + (netAmt >= 0 ? "#4ade80" : "#f87171"), marginTop: 4}}>
                        <span>Net Profit</span>
                        <span style={{fontFamily: M, color: netAmt >= 0 ? "#4ade80" : "#f87171"}}>
                          {fm(netAmt)} ({fP(netPct)})</span>
                      </div>
                    </div>
                  </div>}

                  {allItems.length === 0 &&
                    <div style={{textAlign: "center", padding: 20, color: "#6b7280", fontSize: 11}}>
