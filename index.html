                </div>

                <div>
                  {/* Overhead rate control */}
                  <div style={{background: "#181b23", borderRadius: 8, padding: 12,
                    border: "1px solid #2a2d38", marginBottom: 12}}>
                    <div style={{fontSize: 10, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase",
                      letterSpacing: 1, marginBottom: 6}}>Overhead Allocation</div>
                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6}}>
                      <span style={{fontSize: 10, color: "#9ca3af"}}>
                        {jcOhPct === null ? "Auto from P&L" : "Custom rate"}</span>
                      <button onClick={() => setJcOhPct(jcOhPct === null ? Math.round(tExp / tRev * 1000) / 1000 : null)}
                        style={{padding: "3px 10px", borderRadius: 4, border: "1px solid #2a2d38",
                          background: "#0f1117", color: "#f59e0b", fontSize: 9, fontWeight: 600, cursor: "pointer"}}>
                        {jcOhPct === null ? "Override" : "Auto"}</button>
                    </div>
                    {jcOhPct !== null
                      ? <Sl l="OH Rate" v={jcOhPct} set={setJcOhPct} mn={0.05} mx={0.40} st={0.005} f={fP}
                          sub={"P&L rate: " + fP(tRev > 0 ? tExp / tRev : 0)}/>
                      : <div style={{fontSize: 10, color: "#6b7280"}}>
                          Rate: <strong style={{color: "#e8eaed", fontFamily: M}}>{fP(tRev > 0 ? tExp / tRev : 0)}</strong>
                          {" "}({fm(tExp)} expenses / {fm(tRev)} revenue)</div>
                    }
                  </div>

                  {/* Add cost item form */}
                  <div style={{background: "#181b23", borderRadius: 8, padding: 14,
                    border: "1px solid #2a2d38"}}>
                    <div style={{fontSize: 12, fontWeight: 700, color: "#4ade80", marginBottom: 10}}>
                      Add Cost Item</div>
                    <Tx l="Category" v={jcNew.cat} set={v => setJcNew({...jcNew, cat: v})}
                      opts={["Material", "Labor", "Subcontractor", "Equipment", "Other"]}/>
                    <Tx l="Description" v={jcNew.desc} set={v => setJcNew({...jcNew, desc: v})}/>
                    {jcNew.cat === "Labor" ? <>
                      <Tx l="Hours" v={jcNew.hrs} set={v => setJcNew({...jcNew, hrs: v})} type="number"/>
                      <Tx l="Rate ($/hr)" v={jcNew.rate} set={v => setJcNew({...jcNew, rate: v})} type="number"/>
                      <div style={{fontSize: 10, color: "#6b7280", marginBottom: 6}}>
                        Line total: <strong style={{color: "#e8eaed", fontFamily: M}}>{fm(jcNew.hrs * jcNew.rate)}</strong>
                      </div>
                    </> : <>
                      <Tx l="Qty" v={jcNew.qty} set={v => setJcNew({...jcNew, qty: v})} type="number"/>
                      <Tx l="Unit Cost ($)" v={jcNew.unit} set={v => setJcNew({...jcNew, unit: v})} type="number"/>
                      <div style={{fontSize: 10, color: "#6b7280", marginBottom: 6}}>
                        Line total: <strong style={{color: "#e8eaed", fontFamily: M}}>{fm(jcNew.qty * jcNew.unit)}</strong>
                      </div>
                    </>}
                    <button onClick={addJcItem}
                      style={{width: "100%", padding: "7px", borderRadius: 5, background: "#4ade80",
                        color: "#000", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11,
                        marginBottom: 8}}>+ Add Line Item</button>

                    {jcItems.length > 0 && <>
                      <div style={{fontSize: 10, color: "#6b7280", marginBottom: 4}}>
                        {jcItems.length} unsaved item(s) — {fm(jcItems.reduce((a, i) => a + i.cost, 0))}</div>
                      <button onClick={saveJobCost}
                        style={{width: "100%", padding: "7px", borderRadius: 5, background: "#5b8af5",
                          color: "#fff", fontWeight: 700, border: "none", cursor: "pointer", fontSize: 11}}>
                        Save to Project</button>
                    </>}
                  </div>

                  {/* Job costing summary across all projects */}
                  {jobCosts.length > 0 && <div style={{marginTop: 14}}>
                    <Sc t="All Costed Projects">
                      {jobCosts.map(jc => {
                        const proj = sales.find(s => s.id === jc.projId);
                        if (!proj) return null;
                        const tc = jc.items.reduce((a, i) => a + i.cost, 0);
                        const gpJ = proj.a - tc;
                        const gpJp = proj.a > 0 ? gpJ / proj.a : 0;
                        const ohJ = proj.a * ohRate;
                        const netJ = gpJ - ohJ;
                        const netJp = proj.a > 0 ? netJ / proj.a : 0;
                        return (
                          <div key={jc.projId} style={{padding: "6px 0", borderBottom: "1px solid #2a2d38",
                            fontSize: 10, cursor: "pointer"}} onClick={() => { setJcProj(jc.projId); setJcItems([]); }}>
                            <div style={{display: "flex", justifyContent: "space-between"}}>
                              <span style={{fontWeight: 500}}>{proj.name}</span>
                              <span style={{fontFamily: M, color: "#5b8af5"}}>{fm(proj.a)}</span>
                            </div>
                            <div style={{display: "flex", justifyContent: "space-between", marginTop: 2}}>
                              <span style={{color: "#6b7280"}}>GP: <span style={{color: gpJp >= 0.26 ? "#4ade80" : gpJp >= 0.15 ? "#fbbf24" : "#f87171",
                                fontFamily: M}}>{fm(gpJ)} ({fP(gpJp)})</span></span>
                              <span style={{color: "#6b7280"}}>Net: <span style={{color: netJ >= 0 ? "#4ade80" : "#f87171",
                                fontFamily: M, fontWeight: 700}}>{fm(netJ)} ({fP(netJp)})</span></span>
                            </div>
                          </div>
                        );
                      })}
                    </Sc>
                  </div>}
                </div>
              </Rw>
            </div>}
          </div>;
        })()}

        {/* ═══ TAB 7: WIP ═══ */}
        {tab === 7 && <div>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16}}>
            <h2 style={{margin: 0, fontSize: 17, fontWeight: 800}}>WIP Report</h2>
            <label style={{padding: "6px 16px", borderRadius: 6, background: "#5b8af5", color: "#fff",
              fontSize: 11, fontWeight: 700, cursor: "pointer"}}>
              Upload WIP Report (.xlsx)
              <input type="file" accept=".xlsx,.xls" style={{display: "none"}}
                onChange={e => { if(e.target.files[0]) parseWIP(e.target.files[0]); }}/>
            </label>
          </div>
          {wipDate && <div style={{fontSize: 10, color: "#6b7280", marginBottom: 12}}>Report Date: {wipDate}</div>}
          {!wipData && <div style={{textAlign: "center", padding: 40, color: "#6b7280", fontSize: 12}}>
            Upload a WIP report (.xlsx) to see project-level financial data.</div>}
          {wipData && (() => {
            const sumField = (f) => wipData.reduce((a, p) => a + p[f], 0);
            const totalContract = sumField('contractPrice');
            const totalCostToDate = sumField('actualCost');
            const totalEstFinalGP = sumField('estFinalGP');
            const totalOverbilled = sumField('overbilled');
            const totalUnderbilled = sumField('underbilled');
            const totalBacklog = sumField('workingCapital');
            const slipped = wipData.filter(p => p.costSlip < 0);
            const overBilledProj = wipData.filter(p => p.overbilled > 5000);
            const underBilledProj = wipData.filter(p => p.underbilled > 5000);
            return <div>
              <div style={{display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16}}>

        {/* ═══ TAB 8: P&L ACTUALS ═══ */}
        {tab === 8 && <div>

            <h2 style={{margin: 0, fontSize: 17, fontWeight: 800}}>P&L Actuals</h2>
            <label style={{padding: "6px 16px", borderRadius: 6, background: "#5b8af5", color: "#fff",
              fontSize: 11, fontWeight: 700, cursor: "pointer"}}>
              Upload P&L (.xlsx)
              <input type="file" accept=".xlsx,.xls" style={{display: "none"}}
                onChange={e => { if(e.target.files[0]) parsePL(e.target.files[0]); }}/>

          </div>
          {!plData && <div style={{textAlign: "center", padding: 40, color: "#6b7280", fontSize: 12}}>
            Upload a Profit & Loss report (.xlsx) to see monthly actuals and budget comparison.</div>}
          {plData && plData.length > 0 && (() => {
            const ytdRev = plData.reduce((a, m) => a + m.revenue, 0);
            const ytdCogs = plData.reduce((a, m) => a + m.cogs, 0);
            const ytdGP = ytdRev - ytdCogs;
            const ytdGPM = ytdRev > 0 ? ytdGP / ytdRev : 0;
            const ytdExp = plData.reduce((a, m) => a + m.expenses, 0);
            const ytdNI = ytdGP - ytdExp;
            const moCount = plData.length;
            const monthlyBurn = moCount > 0 ? ytdExp / moCount : 0;
            const beRevMonthly = ytdGPM > 0 ? monthlyBurn / ytdGPM : 0;
            const annualizedRev = moCount > 0 ? (ytdRev / moCount) * 12 : 0;
            const annualizedGP = moCount > 0 ? (ytdGP / moCount) * 12 : 0;
            const annualizedExp = moCount > 0 ? (ytdExp / moCount) * 12 : 0;
            const annualizedNI = moCount > 0 ? (ytdNI / moCount) * 12 : 0;
            return <div>
              <div style={{display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16}}>
                <KP l="YTD Revenue" v={fm(ytdRev)} c="#5b8af5"/>
                <KP l="YTD GP%" v={fP(ytdGPM)} c={ytdGPM >= 0.26 ? "#4ade80" : ytdGPM >= 0.15 ? "#fbbf24" : "#f87171"}/>
                <KP l="YTD Net Income" v={fm(ytdNI)} c={ytdNI >= 0 ? "#4ade80" : "#f87171"}/>
                <KP l="Monthly Burn Rate" v={fm(monthlyBurn)} c="#fbbf24"/>
                <KP l="Breakeven Rev/Mo" v={fm(beRevMonthly)} sub="at actual GPM"/>
              </div>

              <Sc t="Monthly P&L">
                <div style={{overflowX: "auto"}}>
                  <table style={{width: "100%", borderCollapse: "collapse", fontSize: 10}}>
                    <thead>
                      <tr style={{borderBottom: "2px solid #2a2d38"}}>
                        <th style={{padding: "5px 6px", textAlign: "left", color: "#6b7280", fontSize: 9, position: "sticky", left: 0, background: "#0f1117"}}>Metric</th>
                        {plData.map((m, i) => <th key={i} style={{padding: "5px 6px", textAlign: "right", color: "#6b7280", fontSize: 9, minWidth: 70}}>{m.month}</th>)}
                        <th style={{padding: "5px 6px", textAlign: "right", color: "#5b8af5", fontSize: 9, fontWeight: 700, minWidth: 80}}>YTD</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        {label: "Revenue", key: "revenue", fmt: fm, colorFn: () => "#e8eaed"},
                        {label: "COGS", key: "cogs", fmt: fm, colorFn: () => "#e8eaed"},
                        {label: "Gross Profit", key: "gp", fmt: fm, colorFn: v => v >= 0 ? "#4ade80" : "#f87171"},
                        {label: "GP%", key: "gpm", fmt: fP, colorFn: v => v >= 0.26 ? "#4ade80" : v >= 0.15 ? "#fbbf24" : "#f87171"},
                        {label: "Expenses", key: "expenses", fmt: fm, colorFn: () => "#fbbf24"},
                        {label: "Net Income", key: "netIncome", fmt: fm, colorFn: v => v >= 0 ? "#4ade80" : "#f87171"},
                        {label: "NI%", key: "nim", fmt: fP, colorFn: v => v >= 0 ? "#4ade80" : "#f87171"},
                      ].map((row, ri) => {
                        const ytdVal = row.key === "gpm" ? ytdGPM
                          : row.key === "nim" ? (ytdRev > 0 ? ytdNI / ytdRev : 0)
                          : plData.reduce((a, m) => a + m[row.key], 0);
                        return <tr key={ri} style={{borderBottom: "1px solid #2a2d38"}}>
                          <td style={{padding: "5px 6px", fontWeight: 600, color: "#9ca3af", position: "sticky", left: 0, background: "#0f1117"}}>{row.label}</td>
                          {plData.map((m, i) => <td key={i} style={{padding: "5px 6px", textAlign: "right",
                            fontFamily: M, color: row.colorFn(m[row.key])}}>{row.fmt(m[row.key])}</td>)}
                          <td style={{padding: "5px 6px", textAlign: "right", fontFamily: M, fontWeight: 700,
                            color: row.colorFn(ytdVal)}}>{row.fmt(ytdVal)}</td>
                        </tr>;
                      })}
                    </tbody>
                  </table>
                </div>
              </Sc>

              <Sc t="Budget vs Actual (Annualized)">
                <div style={{fontSize: 10, color: "#6b7280", marginBottom: 8}}>
                  Based on {moCount} months of actuals, annualized to 12 months vs budget targets.
                </div>
                <BvA l="Revenue" b={tRev} a={annualizedRev}/>
                <BvA l="Gross Profit" b={gp} a={annualizedGP}/>
                <BvA l="Total Expenses" b={tExp} a={annualizedExp}/>
                <div style={{marginBottom: 9}}>
                  <div style={{display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2}}>
                    <span style={{color: "#6b7280"}}>Net Income</span>
                    <span style={{fontFamily: M, fontSize: 9}}>
                      <span style={{color: annualizedNI >= 0 ? "#4ade80" : "#f87171"}}>{fm(annualizedNI)}</span>
                      {" / "}
                      {fm(gp - tExp)} (budget)
                    </span>
                  </div>
                  <div style={{height: 7, background: "#2a2d38", borderRadius: 4, position: "relative"}}>
                    <div style={{position: "absolute", height: "100%",
                      width: Math.min(Math.max(annualizedNI / Math.max(1, gp - tExp), 0), 1) * 100 + "%",
                      background: annualizedNI >= 0 ? "#4ade80" : "#f87171", borderRadius: 4}}/>
                  </div>
                </div>
              </Sc>

              <Sc t="GP% Trend by Month">
                <div style={{display: "flex", gap: 6, flexWrap: "wrap"}}>
                  {plData.map((m, i) => {
                    const c = m.gpm >= 0.26 ? "#4ade80" : m.gpm >= 0.15 ? "#fbbf24" : "#f87171";
                    return <div key={i} style={{background: "#181b23", border: "1px solid #2a2d38",

                      <div style={{fontSize: 14, fontWeight: 800, fontFamily: M, color: c}}>{(m.gpm * 100).toFixed(1)}%</div>

        {/* ═══ TAB 9: OPEN AR ═══ */}
        {tab === 9 && <div>
          {(() => {
            const parseAR = (file) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const wb = XLSX.read(e.target.result, {type: "array", cellDates: true});
                const weeks = [];
                wb.SheetNames.forEach(name => {
                  const ws = wb.Sheets[name];
                  const rows = XLSX.utils.sheet_to_json(ws, {header: 1, defval: null});
                  const buckets = {};
                  let curBucket = null;
                  let items = [];
                  let grandTotal = 0;
                  rows.forEach(r => {
                    const a = r[0], b = r[1], h = r[7];
                    if (typeof a === "string" && a.match(/^\d+ or more|^\d+\s*-\s*\d+|^CURRENT/i)) {
                      curBucket = a.trim();
                      return;
                    }
                    if (typeof a === "string" && a.startsWith("Total for ")) {
                      if (curBucket) buckets[curBucket] = {total: h || 0, items};
                      items = [];
                      curBucket = null;
                      return;
                    }
                    if (b === "TOTAL") { grandTotal = h || 0; return; }
                    if (b === "Date" || !b) return;
                    if (curBucket && h != null) {
                      const custRaw = r[3] || "";
                      const parts = custRaw.split(":");
                      const customer = parts[0] || "";
                      const project = parts.slice(1).join(":").trim() || "";
                      items.push({
                        date: r[1], num: r[2], customer, project,
                        due: r[4], rep: r[5], pastDue: r[6], balance: h, notes: r[8] || ""
                      });
                    }
                  });
                  if (curBucket && items.length) buckets[curBucket] = {total: items.reduce((a,i)=>a+i.balance,0), items};
                  const dp = name.split(".");
                  let dt = name;
                  let displayName = name;
                  if (dp.length === 3 && !isNaN(dp[0]) && !isNaN(dp[1])) {
                    const yr = dp[2].length === 2 ? "20" + dp[2] : dp[2];
                    dt = yr + "-" + dp[0].padStart(2,"0") + "-" + dp[1].padStart(2,"0");
                  } else {
                    /* Sheet name isn't a date — use today's date */
                    const now = new Date();
                    const m = now.getMonth() + 1, d = now.getDate(), y = String(now.getFullYear()).slice(2);
                    displayName = m + "." + d + "." + y;
                    dt = now.getFullYear() + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
                  }
                  weeks.push({name: displayName, dt, buckets, grandTotal});
                });
                /* Merge new weeks into existing data — replace matching dates, add new ones */
                const existing = arData || [];
                const merged = [...existing];
                weeks.forEach(nw => {
                  const idx = merged.findIndex(ew => ew.dt === nw.dt);
                  if (idx >= 0) merged[idx] = nw; else merged.push(nw);
                });
                merged.sort((a,b) => a.dt.localeCompare(b.dt));
                setArData(merged);
                setArWeekIdx(-1); /* jump to latest */
                supabase.from('ar_uploads').upsert({id: 1, data: merged, updated_at: new Date().toISOString()})
                  .then(({error}) => {
                    if (error) { console.error('AR save error:', error); alert('AR save failed: ' + error.message); }
                    else { console.log('AR data saved to Supabase (' + merged.length + ' weeks)'); }
                  });
              };
              reader.readAsArrayBuffer(file);
            };

            const addArNote = async (invoiceNum, note, contactedBy) => {
              const today = new Date().toISOString().slice(0, 10);
              const row = {invoice_num: invoiceNum, note, contacted_by: contactedBy, contact_date: today};
              const {data, error} = await supabase.from('ar_notes').insert([row]).select();
              if (!error && data && data[0]) setArNotes(p => [data[0], ...p]);
            };
            const deleteArNote = async (id) => {
              const {error} = await supabase.from('ar_notes').delete().eq('id', id);
              if (!error) setArNotes(p => p.filter(n => n.id !== id));
            };
            const notesFor = (inv) => arNotes.filter(n => n.invoice_num === inv);

            const bucketOrder = ["91 or more days past due", "61 - 90 days past due", "31 - 60 days past due", "1 - 30 days past due", "CURRENT"];
            const bucketColors = {"91 or more days past due":"#f87171","61 - 90 days past due":"#fb923c","31 - 60 days past due":"#fbbf24","1 - 30 days past due":"#a3e635","CURRENT":"#4ade80"};
            const bucketShort = {"91 or more days past due":"91+","61 - 90 days past due":"61-90","31 - 60 days past due":"31-60","1 - 30 days past due":"1-30","CURRENT":"Current"};
            /* Match AR invoices to sales log reps by project number */
            const repLookup = {};
            sales.forEach(s => { if (s.id && s.r) repLookup[s.id] = s.r; });
            const findRep = (inv) => {
              if (!inv) return "";
              const base = String(inv).split("-")[0].trim();
              if (repLookup[base]) return repLookup[base];
              /* try matching with leading zeros stripped */
              const num = base.replace(/^0+/, "");
              for (const k in repLookup) { if (k.replace(/^0+/, "") === num) return repLookup[k]; }
              return "";
            };
            const selIdx = arData ? (arWeekIdx < 0 || arWeekIdx >= arData.length ? arData.length - 1 : arWeekIdx) : 0;
            const selected = arData ? arData[selIdx] : null;
            const allItems = selected ? bucketOrder.flatMap(b => (selected.buckets[b]?.items || []).map(i => ({...i, bucket: b, rep: findRep(i.num)}))) : [];

            /* Inline AR row component with expandable notes + contact log */
            function ARRow({item, idx}) {
              const [open, setOpen] = useState(false);
              const [newNote, setNewNote] = useState("");
              const [newBy, setNewBy] = useState("");
              const inv = item.num || "";
              const logs = notesFor(inv);
              const lastContact = logs.length > 0 ? logs[0] : null;
              return <React.Fragment>
                <tr style={{borderBottom: open ? "none" : "1px solid #1e2028", cursor: "pointer",
                  background: open ? "#181b23" : "transparent"}} onClick={() => setOpen(!open)}>
                  <td style={{padding:"6px", whiteSpace:"nowrap"}}>
                    <span style={{display:"inline-block", width:6, height:6, borderRadius:3,
                      background: bucketColors[item.bucket], marginRight:4}}/>
                    <span style={{fontSize:9}}>{bucketShort[item.bucket]}</span>
                  </td>
                  <td style={{padding:"6px", maxWidth:140, overflow:"hidden", textOverflow:"ellipsis",
                    whiteSpace:"nowrap"}}>{item.customer}</td>
                  <td style={{padding:"6px", maxWidth:160, overflow:"hidden", textOverflow:"ellipsis",
                    whiteSpace:"nowrap", color:"#5b8af5"}}>{item.project}</td>
                  <td style={{padding:"6px", fontFamily:M, fontSize:9}}>{item.num}</td>
                  <td style={{padding:"6px", textAlign:"right", fontFamily:M, fontWeight:700,
                    color: item.balance < 0 ? "#4ade80" : "#e8eaed"}}>{fm(item.balance)}</td>
                  <td style={{padding:"6px", textAlign:"right", fontFamily:M,
                    color: item.pastDue > 90 ? "#f87171" : item.pastDue > 60 ? "#fb923c" : item.pastDue > 30 ? "#fbbf24" : "#e8eaed"}}>{item.pastDue}d</td>
                  <td style={{padding:"6px", fontSize:10, color:"#fbbf24", fontWeight:600}}>{item.rep || ""}</td>
                  <td style={{padding:"6px", fontSize:9, whiteSpace:"nowrap"}}>
                    {lastContact
                      ? <span style={{color:"#4ade80"}}>{lastContact.contact_date} — {lastContact.contacted_by}</span>
                      : <span style={{color:"#6b7280"}}>No contact logged</span>}
                  </td>
                  <td style={{padding:"6px", fontSize:9, color:"#6b7280"}}>{open ? "▲" : "▼"}</td>
                </tr>
                {open && <tr style={{borderBottom:"1px solid #2a2d38"}}>
                  <td colSpan={9} style={{padding:"0 6px 10px 20px", background:"#181b23"}}>
                    {/* Excel notes */}
                    {item.notes && <div style={{padding:"8px 0 6px", fontSize:10, color:"#9ca3af",
                      borderBottom:"1px solid #1e2028", marginBottom:6}}>
                      <span style={{color:"#6b7280", fontWeight:600, fontSize:9, textTransform:"uppercase"}}>QB Notes: </span>
                      {item.notes}
                    </div>}
                    {/* Contact log entries */}
                    {logs.length > 0 && <div style={{marginBottom:8}}>
                      <div style={{fontSize:9, color:"#6b7280", fontWeight:600, textTransform:"uppercase", marginBottom:4}}>Contact Log</div>
                      {logs.map(n => <div key={n.id} style={{display:"flex", justifyContent:"space-between",
                        alignItems:"flex-start", padding:"4px 0", borderBottom:"1px solid #1e2028", fontSize:10}}>
                        <div style={{flex:1}}>
                          <span style={{color:"#5b8af5", fontFamily:M, marginRight:6}}>{n.contact_date}</span>
                          <span style={{color:"#fbbf24", marginRight:6}}>{n.contacted_by}</span>
                          <span style={{color:"#e8eaed"}}>{n.note}</span>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); deleteArNote(n.id); }}
                          style={{background:"none", border:"none", color:"#f87171", cursor:"pointer",
                            fontSize:9, padding:"0 4px", flexShrink:0}}>✕</button>
                      </div>)}
                    </div>}
                    {/* Add new note form */}
                    <div style={{display:"flex", gap:6, alignItems:"center", marginTop:4}}
                      onClick={e => e.stopPropagation()}>
                      <input value={newBy} onChange={e => setNewBy(e.target.value)}
                        placeholder="Initials" style={{width:60, padding:"4px 6px", fontSize:10,
                          background:"#0f1117", border:"1px solid #2a2d38", borderRadius:4, color:"#e8eaed"}}/>
                      <input value={newNote} onChange={e => setNewNote(e.target.value)}
                        placeholder="Note — e.g. Left voicemail, emailed invoice..."
                        onKeyDown={e => { if (e.key === "Enter" && newNote.trim()) {
                          addArNote(inv, newNote.trim(), newBy.trim()); setNewNote(""); setNewBy(""); }}}
                        style={{flex:1, padding:"4px 6px", fontSize:10,
                          background:"#0f1117", border:"1px solid #2a2d38", borderRadius:4, color:"#e8eaed"}}/>
                      <button onClick={() => { if (newNote.trim()) {
                          addArNote(inv, newNote.trim(), newBy.trim()); setNewNote(""); setNewBy(""); }}}
                        style={{padding:"4px 10px", fontSize:10, fontWeight:600, background:"#5b8af5",
                          border:"none", borderRadius:4, color:"#fff", cursor:"pointer"}}>Add</button>
                    </div>
                  </td>
                </tr>}
              </React.Fragment>;
            }

            const resetAR = () => {
              if (!confirm("Reset all AR data? This clears all uploaded weeks. Contact notes are kept.")) return;
              setArData(null);
              setArWeekIdx(-1);
              supabase.from('ar_uploads').upsert({id: 1, data: null, updated_at: new Date().toISOString()});
            };

            return <div>
              <div style={{display:"flex", gap:8, alignItems:"stretch", marginBottom:16}}>
                <div style={{flex:1, padding: 16, background: "#181b23", borderRadius: 8,
                  border: "2px dashed #2a2d38", textAlign: "center", cursor: "pointer"}}
                  onDragOver={e => e.preventDefault()}
                  onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) parseAR(e.dataTransfer.files[0]); }}
                  onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".xlsx,.xls"; inp.onchange = e => { if (e.target.files[0]) parseAR(e.target.files[0]); }; inp.click(); }}>
                  <div style={{fontSize: 13, fontWeight: 700, marginBottom: 4}}>
                    {arData ? "Open AR Loaded (" + arData.length + " weeks)" : "Upload Open AR Excel"}
                  </div>
                  <div style={{fontSize: 10, color: "#6b7280"}}>
                    {arData ? "Upload new week (adds to history)" : "Click or drag & drop FLKC 2026 Open AR.xlsx"}
                  </div>
                </div>
                {arData && <button onClick={(e) => { e.stopPropagation(); resetAR(); }}
                  style={{padding:"8px 16px", background:"#181b23", border:"1px solid #f87171", borderRadius:8,
                    color:"#f87171", fontSize:10, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap"}}>
                  Reset AR Data
                </button>}
              </div>

              {arData && selected && <div>
                {/* Week selector */}
                <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
                  <span style={{fontSize:11, fontWeight:600}}>Week:</span>
                  <select value={selIdx} onChange={e => setArWeekIdx(+e.target.value)}
                    style={{padding:"4px 8px", fontSize:11, background:"#181b23", border:"1px solid #2a2d38",
                      borderRadius:4, color:"#e8eaed", fontFamily:M}}>
                    {arData.map((w, i) => <option key={w.dt} value={i}>{w.name}{i === arData.length - 1 ? " (latest)" : ""}</option>)}
                  </select>
                  <span style={{fontSize:10, color:"#6b7280"}}>{arData.length} weeks tracked</span>
                  <button onClick={() => setArTrendOpen(!arTrendOpen)}
                    style={{marginLeft:"auto", padding:"4px 10px", fontSize:10, fontWeight:600,
                      background:"none", border:"1px solid #2a2d38", borderRadius:4, color:"#5b8af5",
                      cursor:"pointer"}}>{arTrendOpen ? "Hide Trend" : "Show Trend"}</button>
                </div>

                {/* Collapsible trend section */}
                {arTrendOpen && <Rw>
                  <Sc t="Weekly AR Trend">
                    {(() => {
                      const maxAR = Math.max(...arData.map(w => w.grandTotal), 1);
                      return arData.map((w, i) => <Br key={w.name} l={w.name} v={w.grandTotal} mx={maxAR}
                        c={i === selIdx ? "#5b8af5" : "#3b5998"}/>);
                    })()}
                  </Sc>
                  <Sc t="Aging Breakdown by Week">
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%", borderCollapse:"collapse", fontSize:10, fontFamily:M}}>
                        <thead>
                          <tr>
                            <th style={{textAlign:"left", padding:"4px 6px", color:"#6b7280", borderBottom:"1px solid #2a2d38"}}>Week</th>
                            {bucketOrder.map(b => <th key={b} style={{textAlign:"right", padding:"4px 6px",
                              color: bucketColors[b], borderBottom:"1px solid #2a2d38"}}>{bucketShort[b]}</th>)}
                            <th style={{textAlign:"right", padding:"4px 6px", color:"#5b8af5", borderBottom:"1px solid #2a2d38"}}>Total</th>
                          </tr>
                        </thead>
                        <tbody>
                          {arData.map((w, i) => <tr key={w.name} style={{background: i === selIdx ? "#1e2028" : "transparent"}}>
                            <td style={{padding:"4px 6px", borderBottom:"1px solid #1e2028"}}>{w.name}</td>
                            {bucketOrder.map(b => <td key={b} style={{textAlign:"right", padding:"4px 6px",
                              borderBottom:"1px solid #1e2028"}}>{fm(w.buckets[b]?.total || 0)}</td>)}
                            <td style={{textAlign:"right", padding:"4px 6px", fontWeight:700, color:"#5b8af5",
                              borderBottom:"1px solid #1e2028"}}>{fm(w.grandTotal)}</td>
                          </tr>)}
                        </tbody>
                      </table>
                    </div>
                  </Sc>
                </Rw>}

              <Rw>
                <div>
                  <Sc t={"Aging Summary — " + selected.name}>
                    {bucketOrder.map(b => {
                      const bk = selected.buckets[b];
                      const tot = bk ? bk.total : 0;
                      const ct = bk ? bk.items.length : 0;
                      return <div key={b} style={{display:"flex", justifyContent:"space-between", alignItems:"center",
                        padding:"6px 0", borderBottom:"1px solid #1e2028"}}>
                        <div>
                          <span style={{display:"inline-block", width:8, height:8, borderRadius:4,
                            background: bucketColors[b], marginRight:8}}/>
                          <span style={{fontSize:11}}>{bucketShort[b]}</span>
                          <span style={{fontSize:9, color:"#6b7280", marginLeft:6}}>({ct})</span>
                        </div>
                        <span style={{fontFamily:M, fontWeight:700, fontSize:12,
                          color: tot < 0 ? "#4ade80" : "#e8eaed"}}>{fm(tot)}</span>
                      </div>;
                    })}
                    <div style={{display:"flex", justifyContent:"space-between", padding:"8px 0",
                      fontWeight:800, borderTop:"2px solid #5b8af5", marginTop:4}}>
                      <span>Total Open AR</span>
                      <span style={{fontFamily:M, color:"#5b8af5"}}>{fm(selected.grandTotal)}</span>
                    </div>
                  </Sc>
                </div>

                <div>
                  <Sc t={"Invoices — " + selected.name + " (" + allItems.length + ")"}>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%", borderCollapse:"collapse", fontSize:10}}>
                        <thead>
                          <tr>
                            {["Aging","Customer","Project","Invoice","Balance","Past Due","Rep","Last Contact",""].map(h =>
                              <th key={h} style={{textAlign: h==="Balance" || h==="Past Due" ? "right" : "left",
                                padding:"6px", color:"#6b7280", borderBottom:"1px solid #2a2d38",
                                fontSize:9, whiteSpace:"nowrap"}}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {allItems.map((item, idx) => <ARRow key={idx} item={item} idx={idx}/>)}
                        </tbody>
                      </table>
                    </div>
                  </Sc>
                </div>
              </Rw>
              </div>}

              {!arData && <div style={{textAlign:"center", padding:40, color:"#6b7280"}}>
                Upload the Open AR Excel file to view accounts receivable data.
              </div>}
            </div>;
          })()}
        </div>}

        {/* ═══ TAB 10: EXECUTIVE DASHBOARD ═══ */}
        {tab === 10 && <div id="dashboard-print">
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16}}>
            <div style={{textAlign: "center", flex: 1}}>
              <h2 style={{margin: 0, fontSize: 17, fontWeight: 800}}>2026 Executive Summary</h2>
              <div style={{fontSize: 10, color: "#6b7280", marginTop: 3}}>
                Goal vs Actual &mdash; ForeverLawn KC | DSM | STL</div>
            </div>
            <button onClick={printDashboard} className="no-print"
              style={{padding: "5px 14px", borderRadius: 5, border: "1px solid #2a2d38",
                background: "#181b23", color: "#5b8af5", fontSize: 10, fontWeight: 600, cursor: "pointer"}}>
              Print / PDF</button>
          </div>
          <div style={{display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16}}>
            <KP l="Revenue Goal" v={fm(tRev)}/>
            <KP l="Actual YTD Sales" v={fm(aTot)} c="#5b8af5"
              sub={fP(tRev > 0 ? aTot / tRev : 0) + " of goal"}/>
            <KP l="Net Income (Company)" v={fm(companyNI)}
              c={companyNI >= 0 ? "#4ade80" : "#f87171"} sub={fP(companyNM) + " margin"}/>
            <KP l="Projects Closed" v={s26.length + ""} c="#5b8af5">
              <div style={{marginTop: 6, fontSize: 9, color: "#6b7280"}}>
                <div>{aSf.toLocaleString()} total sqft</div>
                <div style={{display: "flex", gap: 8, marginTop: 3}}>
                  {["KC", "DSM", "STL"].map(m =>
                    <span key={m}><strong style={{color: "#e8eaed"}}>{m}:</strong> {sfByM(m).toLocaleString()} sf</span>
                  )}
                </div>
              </div>
            </KP>
          </div>

          <Rw>
            <div>
              <Sc t="Revenue - Goal vs Actual">
                {reps.map(r => <BvA key={r.id} l={r.name + " (" + r.market + ")"} b={r.goal} a={aByR(r.name)}/>)}
                <BvA l="House" b={houseGoal} a={houseActual}/>
                <div style={{height: 1, background: "#5b8af5", margin: "6px 0"}}/>
                <BvA l="TOTAL" b={tRev} a={aTot}/>
              </Sc>
              <Sc t="By Market - Goal vs Actual">
                {(() => {
                  const markets = [...new Set(reps.map(r => r.market))];
                  const mGoal = m => reps.filter(r => r.market === m).reduce((a,r) => a + r.goal, 0);
                  return markets.map(m => <BvA key={m} l={m} b={mGoal(m)} a={aByM(m)}/>);
                })()}
              </Sc>
              <Sc t="P&L (at Revenue Goal)">
                <St l="Revenue" v={fm(tRev)} c="#5b8af5"/>
                <St l="COGS" v={fm(tRev - gp)} c="#f87171"/>
                <St l="Gross Profit" v={fm(gp)} c="#4ade80"/>
                <St l="Core Payroll" v={fm(tPay)} c="#fbbf24"/>
                <St l="Non-Payroll OH" v={fm(tOH)} c="#fbbf24"/>
                {instOn && <St l="Install Savings" v={(intSv >= 0 ? "+" : "") + fm(intSv)} c="#22d3ee"/>}
                <St l="PTET" v={fm(companyPtet)}/>
                <div style={{display: "flex", justifyContent: "space-between", padding: "7px 0",
                  fontWeight: 800, fontSize: 13, borderTop: "2px solid #5b8af5", marginTop: 4}}>
                  <span>Net Income</span>
                  <span style={{fontFamily: M, color: companyNI >= 0 ? "#4ade80" : "#f87171"}}>
                    {fm(companyNI)}</span>
                </div>
              </Sc>
            </div>
            <div>
              <Sc t="Product Mix (Actual YTD)">
                {[["Playground", "pg"], ["K9", "k9"], ["Landscape", "ls"],
                  ["Golf", "gf"], ["Sports", "sp"], ["Misc (Mounds)", "ms"]].map(function(x) {
                  const n = x[0], k = x[1];
                  const t = s26.reduce((a, s) => a + (s[k] || 0), 0);
                  const sf = s26.filter(s => s[k] > 0).reduce((a, s) => a + (s.sf || 0), 0);
                  if (t <= 0) return null;
                  return (
                    <div key={n} style={{marginBottom: 7}}>
                      <div style={{display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2}}>
                        <span style={{fontWeight: 600}}>{n}</span>
                        <span style={{fontFamily: M}}>{fm(t)}{" "}
                          <span style={{color: "#6b7280"}}>| {sf.toLocaleString()} sf</span></span>
                      </div>
                      <div style={{height: 5, background: "#2a2d38", borderRadius: 3}}>
                        <div style={{height: "100%", width: ((t / aTot) * 100) + "%",
                          background: "#5b8af5", borderRadius: 3}}/>
                      </div>
                    </div>
                  );
                })}
              </Sc>
              <Sc t="Revenue by Market (Actual YTD)">
                {["KC", "DSM", "STL"].map(m => {
                  const t = aByM(m);
                  const ct = s26.filter(s => matchMkt(s.m, m)).length;
                  const sf = sfByM(m);
                  if (t <= 0) return null;
                  return (
                    <div key={m} style={{marginBottom: 7}}>
                      <div style={{display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2}}>
                        <span style={{fontWeight: 600}}>{m}</span>
                        <span style={{fontFamily: M}}>{fm(t)} ({ct} proj){" "}
                          <span style={{color: "#6b7280"}}>| {sf.toLocaleString()} sf</span></span>
                      </div>
                      <div style={{height: 5, background: "#2a2d38", borderRadius: 3}}>
                        <div style={{height: "100%", width: ((t / aTot) * 100) + "%",
                          background: "#5b8af5", borderRadius: 3}}/>
                      </div>
                    </div>
                  );
                })}
              </Sc>
              <Sc t="Install Operations">
                <St l="Total POs" v={i26.length + ""}/>
                <St l="Total Spend" v={fm(i26.reduce((a, p) => a + p.amount, 0))}/>
                <St l="Total Sqft" v={i26.reduce((a, p) => a + (p.sqft || 0), 0).toLocaleString()}/>
                {i26.length > 0 &&
                  <St l="Avg $/sf" v={"$" + (i26.reduce((a, p) => a + p.amount, 0) /
                    Math.max(1, i26.reduce((a, p) => a + (p.sqft || 0), 0))).toFixed(2)}/>}
              </Sc>
              <Sc t="Ordered Sqft Tracker">
                <div style={{fontSize: 10, color: "#6b7280", marginBottom: 6}}>
                  Includes 2025 carryover orders shipping in 2026 + new 2026 orders.
                  Update monthly from manufacturing report.</div>
                <Fd l="Total Ordered Sqft (from mfg report)" v={orderedSf} set={setOrderedSf}
                  sub="Enter total sqft from monthly report"/>
                <St l="Sold Sqft (2026 sales)" v={aSf.toLocaleString() + " sf"}/>
                <St l="Ordered Sqft (mfg report)" v={orderedSf.toLocaleString() + " sf"} c="#5b8af5"/>
                <St l="PO Install Sqft" v={i26.reduce((a, p) => a + (p.sqft || 0), 0).toLocaleString() + " sf"}/>
                {orderedSf > 0 && <div style={{marginTop: 6}}>
                  <BvA l="Ordered vs Crew Capacity" b={tCap} a={orderedSf}/>
                </div>}
              </Sc>
            </div>
          </Rw>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
